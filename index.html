  <style>

    .tagline {

      color: #ccc;

    }
    .buttons {
      margin: 40px 0;

      justify-content: center;
      gap: 25px;
    }
    .buttons a {
      padding: 15px 30px;
      font-size: 1.2rem;
      border-radius: 40px;
      background: linear-gradient(135deg, #00ffcc, #0066ff);
      text-decoration: none;
      color: #fff;
      font-weight: bold;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .buttons a:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #00ffcc;
    }
    .top-player {
      margin-top: 50px;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;

    .top-player p {
      margin-top: 8px;
      font-size: 1.1rem;
      color: #ccc;
    }
    footer {
      margin-top: 60px;
      padding: 20px;
      font-size: 0.9rem;
      color: #888;
    }
    footer a {
      color: #00ffcc;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <img src="https://www.tyvila.online/cdn/ty.webp" alt="Ty's Studio Logo">
    <h1>Ty's Studio</h1>
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/af/Flag_of_South_Africa.svg" class="flag" alt="South Africa Flag">
    <p class="tagline">A South African E-Business bringing you world-class online gaming & experiences.</p>

  <div class="buttons">
    <a href="login.html">▶ Play</a>
    <a href="ranks.html">🏆 Ranks</a>
  </div>

  <div class="top-player">
    <h2 id="topPlayerName">Loading Top Player...</h2>
    <p>That could be YOU! Start playing now.</p>

  <footer>
    <p>© 2025 Ty's Studio | Built with ❤️ in South Africa</p>
    <p><a href="https://www.tyvila.online/">www.tyvila.online</a></p>
  </footer>

  <script>
    const supabaseUrl = "https://wwcedhbbdboyrmquokyjj.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4";
    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function fetchTopPlayer() {
      let { data, error } = await supabaseClient
        .from("profiles")
        .select("username, points")
        .order("points", { ascending: false })
        .limit(1);

      if (error) {
        console.error("Error fetching top player:", error.message);
        document.getElementById("topPlayerName").innerText = "No player data yet.";
      } else if (data.length > 0) {
        document.getElementById("topPlayerName").innerText = `Top Player: ${data[0].username} (${data[0].points} pts)`;
      } else {
        document.getElementById("topPlayerName").innerText = "No top player yet.";
      }
    }

    fetchTopPlayer();
  </script>
</body>
</html>
