<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TyVila Online Games</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO -->
  <meta name="description" content="Play fun online games, earn points, climb the ranks and enjoy a social gaming experience on TyVila Online.">
  <meta name="keywords" content="TyVila, online games, multiplayer, leaderboard, play games, fun, social">
  <meta name="author" content="tbsv Vilakazi">

  <!-- Social Media Metadata -->
  <meta property="og:title" content="TyVila Online Games">
  <meta property="og:description" content="Play online games, earn points and climb the leaderboard. Join TyVila Online today!">
  <meta property="og:image" content="https://www.tyvila.online/cdn/ty.webp">
  <meta property="og:url" content="https://www.tyvila.online">
  <meta name="twitter:card" content="summary_large_image">

  <!-- Favicon -->
  <link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico" type="image/x-icon">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body {
      background: linear-gradient(135deg, #1a1a1d, #2d2d34, #121212);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      overflow: hidden;
    }
    header {
      padding: 20px;
      font-size: 2.5rem;
      font-weight: bold;
      background: linear-gradient(90deg, #ff416c, #ff4b2b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      margin-top: 15px;
      font-size: 1.2rem;
      max-width: 600px;
      line-height: 1.5;
    }
    .play-btn {
      margin-top: 40px;
      padding: 18px 50px;
      font-size: 1.4rem;
      font-weight: bold;
      border: none;
      border-radius: 50px;
      background: linear-gradient(90deg, #ff4b2b, #ff416c);
      color: #fff;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .play-btn:hover {
      transform: scale(1.05);
      box-shadow: 0px 4px 15px rgba(255, 65, 108, 0.6);
    }
    footer {
      position: absolute;
      bottom: 10px;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    @media (max-width: 768px) {
      header { font-size: 2rem; }
      p { font-size: 1rem; padding: 0 10px; }
      .play-btn { font-size: 1.2rem; padding: 15px 40px; }
    }
  </style>
</head>
<body oncontextmenu="return false;">
  <header>TyVila Online</header>
  <p>Welcome to <strong>TyVila Online</strong> — a fun and social gaming platform where you can play exciting games, earn points, climb the ranks, and challenge your friends.</p>
  <button class="play-btn" onclick="window.location.href='games.html'">▶ Play Now</button>
  <footer>&copy; 2025 TyVila Online. All Rights Reserved.</footer>
</body>
</html>
