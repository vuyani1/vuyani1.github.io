<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- SEO & Metadata -->

  <!-- Open Graph / Facebook -->

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="TyVila Games - Explore Games">
  <meta name="twitter:description" content="Explore TyVila games. Login to access and play your favorite browser games.">
  <meta name="twitter:image" content="https://www.tyvila.online/cdn/ty.webp">

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin:0;
      font-family:'Segoe UI',sans-serif;
      background: linear-gradient(135deg,#0a0a0a,#1a1a1a);
      color:white;
    }
    header {
      background:#111;
      padding:15px 30px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:2px solid #ff6600;
      position:sticky;
      top:0;
      z-index:1000;
    }
    header img { height:50px; }
    nav a {
      color:white;
      text-decoration:none;
      margin-left:25px;
      font-weight:bold;
      transition:0.2s;
    }
    nav a:hover { color:#ff6600; }

    .hero {
      text-align:center;
      padding:60px 20px;
      background: linear-gradient(to right, rgba(255,102,0,0.3), rgba(0,0,0,0.6)), url('https://www.tyvila.online/cdn/hero-bg.jpg') no-repeat center/cover;
      border-bottom: 3px solid #ff6600;
    }
    .hero h1 { font-size:3rem; margin:0 0 10px; text-shadow:2px 2px 8px black; }
    .hero p { font-size:1.2rem; color:#ccc; }

    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      padding:30px;
    }

    .game-card {
      position:relative;
      height:250px;
      border-radius:16px;
      overflow:hidden;
      cursor:pointer;
      box-shadow:0 0 15px rgba(255,102,0,0.4);
      transition:transform 0.3s, box-shadow 0.3s;
      background:#1e1e1e;
    }
    .game-card:hover {
      transform:scale(1.05);
      box-shadow:0 0 30px rgba(255,102,0,0.8);
    }
    .game-card img {
      width:100%;
      height:100%;
      object-fit:cover;
      filter:brightness(0.6);
      transition:0.3s;
    }
    .game-card:hover img { filter:brightness(1); }
    .game-card h3 {
      position:absolute;
      bottom:50px;
      left:15px;
      margin:0;
      color:white;
      text-shadow:2px 2px 8px black;
    }
    .game-card button {
      position:absolute;
      bottom:15px;
      left:15px;
      padding:8px 16px;
      border:none;
      border-radius:8px;
      background:#ff6600;
      color:white;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }
    .game-card button:hover { background:#e65c00; }

    #cookie-popup {
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:#1e1e1e;
      padding:15px 25px;
      border-radius:12px;
      box-shadow:0 0 20px rgba(255,102,0,0.5);
      display:flex;
      align-items:center;
      gap:15px;
      z-index:1000;
      flex-wrap:wrap;
      max-width:90%;
    }
    #cookie-popup button {
      padding:6px 12px;
      border:none;
      border-radius:8px;
      background:#ff6600;
      color:white;
      cursor:pointer;
    }
    #cookie-popup a { color:#ff6600; text-decoration:underline; }
  </style>
</head>
<body>

<header>
  <img src="https://www.tyvila.online/cdn/ty.webp" alt="TyVila Logo">
  <nav>
    <a href="index.html">Home</a>
    <a href="account.html">My Account</a>
    <a href="leaderboard.html">Leaderboard</a>
    <a href="follow.html">Follow</a>
  </nav>
</header>

<div class="hero">
  <h1>Welcome to TyVila Games</h1>
  <p>Explore games and login to play. Your gaming journey starts here!</p>
</div>

<div class="grid" id="games-grid">Loading...</div>

<div id="cookie-popup">
  <span>We use cookies. By continuing, you agree to our <a href="terms.html" target="_blank">Terms & Conditions</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>.</span>
  <button onclick="acceptCookies()">Accept</button>
</div>

<script>
  const { createClient } = supabase;
  const supabaseClient = createClient(
    "https://wwcedhbbdoyrmquokyjj.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cmxxeWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
  );

  async function loadGames() {
    const { data } = await supabaseClient.from("games").select("*").order("plays",{ascending:false});
    const grid = document.getElementById("games-grid");
    grid.innerHTML="";
    data.forEach(game=>{
      const div=document.createElement("div");
      div.className="game-card";
      div.innerHTML=`
        <img src="${game.image}" alt="${game.name}">
        <h3>${game.name}</h3>
        <button onclick="checkLogin()">Login to Play</button>
      `;
      grid.appendChild(div);
    });
  }

  function checkLogin(){
    supabaseClient.auth.getUser().then(({data:{user}})=>{
      if(!user){
        window.location.href = "login.html";
      } else {
        alert("Games are not playable here. Go to www.tyvila.online/games.");
      }
    });
  }

  function acceptCookies(){
    localStorage.setItem("tyvila_cookies_accepted","true");
    document.getElementById("cookie-popup").style.display="none";
  }

  if(localStorage.getItem("tyvila_cookies_accepted")) document.getElementById("cookie-popup").style.display="none";

  loadGames();
</script>

</body>
</html>
