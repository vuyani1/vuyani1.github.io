<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Account - TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<meta name="description" content="Your TyVila account dashboard: profile, points, rank, friends and chat system.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body {margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0a0a0a,#1a1a1a);color:white;display:flex;height:100vh;}
.sidebar {width:250px;background:#111;display:flex;flex-direction:column;padding:20px;border-right:2px solid #ff6600;overflow-y:auto;}
.sidebar h2 {margin-top:0;text-align:center;}
.sidebar button {margin:5px 0;padding:10px;border:none;border-radius:8px;background:#ff6600;color:white;cursor:pointer;}
.sidebar button:hover {background:#e65c00;}
.main {flex:1;padding:20px;overflow-y:auto;}
.profile-card {margin-bottom:20px;padding:20px;border-radius:16px;background:#1e1e1e;box-shadow:0 0 20px rgba(255,102,0,0.4);text-align:center;}
.profile-pic {width:120px;height:120px;border-radius:50%;border:3px solid #ff6600;object-fit:cover;}
.stats {display:flex;justify-content:space-around;margin-top:15px;flex-wrap:wrap;}
.stat-box {background:#2a2a2a;padding:15px;border-radius:12px;width:30%;text-align:center;margin:5px 0;}
.friends, .chat, .requests {margin-top:25px;background:#1e1e1e;padding:20px;border-radius:16px;box-shadow:0 0 15px rgba(255,102,0,0.3);}
.friends ul, .requests ul {list-style:none;padding:0;margin:0;max-height:200px;overflow-y:auto;}
.friends li, .requests li {padding:10px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center;}
.chat-box {border:1px solid #333;padding:10px;height:200px;overflow-y:auto;background:#111;border-radius:10px;margin-bottom:10px;}
input, button {padding:10px;border:none;border-radius:8px;margin:5px 0;}
input {width:70%;background:#2a2a2a;color:white;}
button {background:#ff6600;color:white;cursor:pointer;}
button:hover {background:#e65c00;}
.admin-badge {display:inline-block;margin-top:10px;padding:5px 10px;background:#ff0000;border-radius:8px;font-size:14px;}
@media(max-width:768px){body{flex-direction:column;}.sidebar{width:100%;flex-direction:row;overflow-x:auto;}.main{padding:10px;}}
</style>
</head>
<body>

<div class="sidebar">
<h2>Menu</h2>
<button onclick="goToGames()">Play Games</button>
<button onclick="toggleChat()">Chat</button>
<button onclick="toggleRequests()">Friend Requests</button>
<button onclick="logout()">Logout</button>
<button onclick="deleteAccount()">Delete Account</button>
</div>

<div class="main">
  <div class="profile-card">
    <img id="profile-pic" class="profile-pic" src="https://api.dicebear.com/9.x/thumbs/svg" alt="Profile Picture">
    <h2 id="username">Loading...</h2>
    <p id="email">Loading...</p>
    <div id="admin-badge" class="admin-badge" style="display:none;">Admin</div>

    <div class="stats">
      <div class="stat-box"><h3 id="points">0</h3><p>Points</p></div>
      <div class="stat-box"><h3 id="rank">-</h3><p>Rank</p></div>
      <div class="stat-box"><h3 id="friends-count">0</h3><p>Friends</p></div>
    </div>
  </div>

  <div class="friends">
    <h3>Friends List</h3>
    <ul id="friends-list"><li>No friends yet</li></ul>
    <input type="text" id="friend-username" placeholder="Username to add">
    <button onclick="sendFriendRequest()">Send Friend Request</button>
  </div>

  <div class="requests" id="requests-section" style="display:none;">
    <h3>Pending Friend Requests</h3>
    <ul id="requests-list"><li>No requests</li></ul>
  </div>

  <div class="chat" id="chat-section" style="display:none;">
    <h3>Chat</h3>
    <select id="chat-user"></select>
    <div class="chat-box" id="chat-box"></div>
    <input type="text" id="chat-input" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const { createClient } = supabase;
const supabaseClient = createClient(
  "https://wwcedhbbdoyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
);
let currentUser = null;

async function loadProfile() {
  const { data: { user } } = await supabaseClient.auth.getUser();
  if(!user) window.location.href="login.html";
  currentUser=user;

  const { data } = await supabaseClient.from("profiles").select("*").eq("id",user.id).single();
  if(data){
    document.getElementById("username").innerText=data.username||"Unknown";
    document.getElementById("points").innerText=data.points||0;
    document.getElementById("rank").innerText=data.rank||"-";
    document.getElementById("profile-pic").src=data.avatar_url||"https://api.dicebear.com/9.x/thumbs/svg";
    if(user.email==="vilakazivuyanisiyanda@gmail.com") document.getElementById("admin-badge").style.display="inline-block";
  }
}

async function loadFriends() {
  const { data } = await supabaseClient.from("friends").select("friend_username").eq("user_id",currentUser.id);
  const list=document.getElementById("friends-list");
  list.innerHTML="";
  if(!data || data.length===0){list.innerHTML="<li>No friends yet</li>";}
  else{
    data.forEach(f=>{let li=document.createElement("li");li.innerText=f.friend_username;list.appendChild(li);});
    document.getElementById("friends-count").innerText=data.length;
  }
}

async function loadFriendRequests(){
  const { data } = await supabaseClient.from("friend_requests").select("id,from_user").eq("to_user",currentUser.id);
  const list=document.getElementById("requests-list");
  list.innerHTML="";
  if(!data || data.length===0){list.innerHTML="<li>No requests</li>";}
  else{
    for(let req of data){
      const { data: u } = await supabaseClient.from("profiles").select("username").eq("id",req.from_user).single();
      let li=document.createElement("li");
      li.innerHTML=`${u.username} 
        <button onclick="acceptRequest('${req.id}','${req.from_user}')">Accept</button>
        <button onclick="declineRequest('${req.id}')">Decline</button>`;
      list.appendChild(li);
    }
  }
}

async function sendFriendRequest(){
  const username=document.getElementById("friend-username").value.trim();
  if(!username) return alert("Enter username");
  const { data } = await supabaseClient.from("profiles").select("id").eq("username",username).single();
  if(!data) return alert("User not found");
  await supabaseClient.from("friend_requests").insert([{from_user:currentUser.id,to_user:data.id}]);
  alert("Friend request sent!"); document.getElementById("friend-username").value="";
}

async function acceptRequest(id,fromUser){
  await supabaseClient.from("friends").insert([{user_id:currentUser.id,friend_username:(await supabaseClient.from("profiles").select("username").eq("id",fromUser).single()).data.username}]);
  await supabaseClient.from("friends").insert([{user_id:fromUser,friend_username:(await supabaseClient.from("profiles").select("username").eq("id",currentUser.id).single()).data.username}]);
  await supabaseClient.from("friend_requests").delete().eq("id",id);
  loadFriends(); loadFriendRequests();
}

async function declineRequest(id){await supabaseClient.from("friend_requests").delete().eq("id",id); loadFriendRequests();}

async function loadChatUsers(){
  const { data } = await supabaseClient.from("profiles").select("username,email");
  const select=document.getElementById("chat-user");
  select.innerHTML="";
  data.forEach(u=>{if(u.email!==currentUser.email){const opt=document.createElement("option");opt.value=u.email; opt.text=u.username; select.appendChild(opt);}});
}

async function loadChat(){
  const { data } = await supabaseClient.from("messages").select("*").or(`sender.eq.${currentUser.email},receiver.eq.${currentUser.email}`).order("created_at",{ascending:true});
  const box=document.getElementById("chat-box"); box.innerHTML="";
  data.forEach(m=>{let div=document.createElement("div"); div.innerHTML=`<b>${m.sender}:</b> ${m.content}`; box.appendChild(div);});
  box.scrollTop=box.scrollHeight;
}

async function sendMessage(){
  const to=document.getElementById("chat-user").value;
  const msg=document.getElementById("chat-input").value.trim();
  if(!msg) return;
  await supabaseClient.from("messages").insert([{sender:currentUser.email,receiver:to,content:msg}]);
  document.getElementById("chat-input").value="";
  loadChat();
}

function toggleChat(){const section=document.getElementById("chat-section");section.style.display=section.style.display==="none"?"block":"none";}
function toggleRequests(){const section=document.getElementById("requests-section");section.style.display=section.style.display==="none"?"block":"none";}
function logout(){supabaseClient.auth.signOut();window.location.href="login.html";}
function deleteAccount(){if(confirm("Delete account?")){supabaseClient.from("profiles").delete().eq("id",currentUser.id);logout();}}
function goToGames(){window.location.href="games.html";}

loadProfile();
loadFriends();
loadFriendRequests();
loadChatUsers();
loadChat();
setInterval(loadChat,5000);
</script>
</body>
</html>
