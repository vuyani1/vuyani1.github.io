<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Account — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1724;--card:#0b1220;--muted:#94a3b8;--accent:#7c3aed;--accent-2:#06b6d4;--glass:rgba(255,255,255,0.04);--white:#e6eef8}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:linear-gradient(180deg,#071023 0%,var(--bg) 100%);color:var(--white);min-height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:linear-gradient(90deg,rgba(255,255,255,0.02),transparent);backdrop-filter:blur(6px);border-bottom:1px solid rgba(255,255,255,0.03)}
.header-left{display:flex;gap:12px;align-items:center}
.header-left img{height:44px;border-radius:8px}
.header-left h1{font-size:18px;color:var(--accent)}
.header-right{display:flex;align-items:center;gap:12px}
.header-right img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid var(--accent-2)}
.container{max-width:1024px;margin:28px auto;padding:18px;display:grid;grid-template-columns:320px 1fr;gap:20px;width:100%}
.card{background:var(--card);border-radius:14px;padding:18px;box-shadow:0 6px 30px rgba(2,6,23,0.6);border:1px solid rgba(255,255,255,0.03)}
.profile-top{display:flex;flex-direction:column;align-items:center;gap:12px;text-align:center}
.avatar{width:120px;height:120px;border-radius:50%;object-fit:cover;border:4px solid var(--accent-2)}
.username{font-size:20px;color:var(--accent);font-weight:700}
.email{color:var(--muted);font-size:13px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:16px}
.stat{background:var(--glass);padding:12px;border-radius:10px;text-align:center}
.stat h3{font-size:18px;color:var(--white);margin-bottom:6px}
.stat p{color:var(--muted);font-size:13px}
.actions{display:flex;flex-direction:column;gap:10px;margin-top:18px}
.button{padding:12px;border-radius:10px;border:none;cursor:pointer;font-weight:700}
.button.primary{background:linear-gradient(90deg,var(--accent),var(--accent-2));color:#fff}
.button.secondary{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,0.06)}
.right-column .card{margin-bottom:16px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.game-tile{background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);border-radius:12px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column}
.game-tile img{width:100%;height:110px;object-fit:cover}
.game-tile .meta{padding:10px}
.leaderboard{display:flex;flex-direction:column;gap:10px}
.leader{display:flex;align-items:center;gap:12px}
.leader img{width:48px;height:48px;border-radius:50%}
.leader .info{flex:1}
.visit-link{text-decoration:none;color:var(--accent-2);font-weight:700}
.popup{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--card);padding:18px;border-radius:12px;z-index:60;border:1px solid rgba(255,255,255,0.05);display:none}
.small{font-size:13px;color:var(--muted)}
@media(max-width:900px){.container{grid-template-columns:1fr;width:92%}.avatar{width:96px;height:96px}}
</style>
</head>
<body oncontextmenu="return false">
<header>
  <div class="header-left">
    <img src="https://www.tyvila.online/cdn/ty.webp" alt="logo">
    <h1>My Account</h1>
  </div>
  <div class="header-right">
    <span id="topBadge" class="small">Top player: ...</span>
    <img id="headerAvatar" src="https://www.tyvila.online/cdn/default-avatar.png" alt="avatar">
  </div>
</header>
<main class="container">
  <aside class="card">
    <div class="profile-top">
      <img id="profileAvatar" class="avatar" src="https://www.tyvila.online/cdn/default-avatar.png" alt="avatar">
      <div class="username" id="profileName">Loading...</div>
      <div class="email" id="profileEmail">—</div>
    </div>
    <div class="stats">
      <div class="stat">
        <h3 id="points">0</h3>
        <p>Points</p>
      </div>
      <div class="stat">
        <h3 id="rank">—</h3>
        <p>Global Rank</p>
      </div>
    </div>
    <div class="actions">
      <button id="playGamesBtn" class="button primary">Play Games</button>
      <button id="logoutBtn" class="button secondary">Logout</button>
    </div>
    <div style="margin-top:14px" class="small">
      <div id="sessionNotice"></div>
      <div style="margin-top:8px">Read <a class="visit-link" href="terms.html">Terms</a></div>
    </div>
  </aside>
  <section class="right-column">
    <div class="card">
      <h3 style="margin-bottom:12px">Recent Played Games</h3>
      <div id="recentGames" class="games-grid"></div>
    </div>
    <div class="card">
      <h3 style="margin-bottom:12px">Leaderboard Top 10</h3>
      <div id="leaderboard" class="leaderboard"></div>
    </div>
  </section>
</main>

<div id="forceLogoutPopup" class="popup">
  <div style="font-weight:700;margin-bottom:8px">Account active elsewhere</div>
  <div class="small">Your account is currently active in another session. Log out other session before continuing.</div>
  <div style="display:flex;gap:10px;margin-top:12px">
    <button id="forceLogoutBtn" class="button primary">Log out other session</button>
    <button id="dismissPopup" class="button secondary">Dismiss</button>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://wwcedhbbdoyrmquokyjj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4')
let currentUser, profile, sessionId

async function init(){
  const { data:{ user, session } } = await supabase.auth.getUser()
  if(!user){ window.location.href='login.html'; return }
  currentUser = user
  sessionId = session?.access_token?.slice(0,24) || Date.now().toString()
  await ensureProfile(user)
  await loadProfile()
  await loadRecentGames()
  await loadLeaderboard()
  await checkSessionConflict()
  supabase.auth.onAuthStateChange((event,payload)=>{
    if(event==='SIGNED_OUT') location.href='login.html'
  })
}

async function ensureProfile(user){
  const { data } = await supabase.from('profiles').select('*').eq('id',user.id).maybeSingle()
  if(!data){
    await supabase.from('profiles').insert({id:user.id,email:user.email,username:user.user_metadata?.preferred_username || user.email.split('@')[0],avatar_url:user.user_metadata?.picture,points:0,current_session:sessionId})
  } else {
    if(data.current_session !== sessionId){
      await supabase.from('profiles').update({current_session:sessionId}).eq('id',user.id)
    }
  }
}

async function loadProfile(){
  const { data } = await supabase.from('profiles').select('*').eq('id',currentUser.id).maybeSingle()
  profile = data
  document.getElementById('profileName').textContent = profile.username || 'No Name'
  document.getElementById('profileEmail').textContent = profile.email || currentUser.email
  document.getElementById('profileAvatar').src = profile.avatar_url || currentUser.user_metadata?.picture || 'https://www.tyvila.online/cdn/default-avatar.png'
  document.getElementById('headerAvatar').src = profile.avatar_url || 'https://www.tyvila.online/cdn/default-avatar.png'
  document.getElementById('points').textContent = profile.points ?? 0
  await refreshRank()
}

async function refreshRank(){
  const { data } = await supabase.from('profiles').select('id,points').order('points',{ascending:false}).limit(100)
  const idx = data.findIndex(p => p.id === currentUser.id)
  document.getElementById('rank').textContent = idx>=0 ? '#'+(idx+1) : '—'
}

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await supabase.auth.signOut()
  window.location.href='login.html'
})

document.getElementById('playGamesBtn').addEventListener('click', ()=>{
  window.location.href='games.html'
})

async function loadRecentGames(){
  const { data } = await supabase.from('games').select('*').order('plays',{ascending:false}).limit(8)
  const container = document.getElementById('recentGames')
  container.innerHTML = ''
  data.forEach(g=>{
    const el = document.createElement('div')
    el.className = 'game-tile'
    el.innerHTML = `<img src="${g.image_url || 'https://www.tyvila.online/cdn/default-avatar.png'}"><div class="meta"><div style="font-weight:700">${g.name}</div><div class="small">${(g.description||'').slice(0,70)}</div></div>`
    el.addEventListener('click', ()=>{ location.href = 'games.html?game='+encodeURIComponent(g.name) })
    container.appendChild(el)
  })
}

async function loadLeaderboard(){
  const { data } = await supabase.from('profiles').select('id,username,avatar_url,points').order('points',{ascending:false}).limit(10)
  const board = document.getElementById('leaderboard')
  board.innerHTML = ''
  data.forEach((p,i)=>{
    const d = document.createElement('div')
    d.className = 'leader'
    d.innerHTML = `<img src="${p.avatar_url || 'https://www.tyvila.online/cdn/default-avatar.png'}"><div class="info"><div style="font-weight:700">${p.username}</div><div class="small">${p.points ?? 0} pts</div></div><div style="font-weight:800">#${i+1}</div>`
    board.appendChild(d)
    if(i===0) document.getElementById('topBadge').textContent = 'Top player: '+p.username + ' — that could be you'
  })
}

async function checkSessionConflict(){
  const { data } = await supabase.from('profiles').select('current_session').eq('id',currentUser.id).maybeSingle()
  if(!data) return
  if(data.current_session && data.current_session !== sessionId){
    document.getElementById('sessionNotice').textContent = 'Active in another session'
    showForcePopup()
  }
}

function showForcePopup(){
  const popup = document.getElementById('forceLogoutPopup')
  popup.style.display = 'block'
  document.getElementById('dismissPopup').onclick = ()=> popup.style.display = 'none'
  document.getElementById('forceLogoutBtn').onclick = async ()=>{
    await supabase.from('profiles').update({current_session:sessionId}).eq('id',currentUser.id)
    document.getElementById('sessionNotice').textContent = ''
    popup.style.display = 'none'
  }
}

let playPointsInterval
export async function startPointsLoop(){
  if(playPointsInterval) return
  playPointsInterval = setInterval(async ()=>{
    await supabase.rpc('increment_points',{userid: currentUser.id})
    const { data } = await supabase.from('profiles').select('points').eq('id',currentUser.id).maybeSingle()
    document.getElementById('points').textContent = data?.points ?? profile.points ?? 0
  },1000)
}
init()
</script>
</body>
</html>
