<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Account - TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#000,#1a1a1a);color:white;display:flex;align-items:center;justify-content:center;min-height:100vh}
.container{background:#111;padding:30px;border-radius:15px;box-shadow:0 0 25px #ff6600;width:90%;max-width:450px;text-align:center}
h1{color:#ff6600;margin-bottom:15px}
.info{margin:10px 0;font-size:16px}
.rank{margin-top:10px;font-weight:bold;font-size:18px;color:#00e6ff;text-shadow:0 0 10px #00e6ff}
input{width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px;background:#222;color:white}
button{width:100%;padding:12px;background:#ff6600;border:none;border-radius:8px;color:white;font-size:16px;cursor:pointer;margin-top:10px}
button:hover{background:#e65c00}
</style>
<script>
document.addEventListener("contextmenu",e=>e.preventDefault());
</script>
</head>
<body>
<div class="container">
  <h1>My Account</h1>
  <div id="account-info">
    <p class="info">Loading account...</p>
  </div>
  <h3>Update Profile</h3>
  <input id="new-username" placeholder="New Username">
  <button onclick="updateProfile()">Update</button>
  <button onclick="logout()">Logout</button>
</div>
<script>
const { createClient } = supabase;
const supabaseClient = createClient(
  "https://wwcedhbbdoyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
);

let currentUser;

function getRank(points){
  if(points>=1000) return "🏆 Master";
  if(points>=500) return "💎 Diamond";
  if(points>=250) return "🥇 Gold";
  if(points>=100) return "🥈 Silver";
  if(points>=1) return "🥉 Bronze";
  return "Unranked";
}

async function loadAccount(){
  const { data:{user} } = await supabaseClient.auth.getUser();
  if(!user){window.location.href="login.html";return;}
  currentUser=user;

  const { data } = await supabaseClient.from("profiles").select("username,email,created_at,points").eq("id",user.id).single();
  if(!data) return;

  const rank=getRank(data.points||0);

  document.getElementById("account-info").innerHTML=
    `<p class="info"><b>Username:</b> ${data.username||"Not set"}</p>
     <p class="info"><b>Email:</b> ${data.email}</p>
     <p class="info"><b>Joined:</b> ${new Date(data.created_at).toLocaleDateString()}</p>
     <p class="info"><b>Points:</b> ${data.points||0}</p>
     <p class="rank"><b>Rank:</b> ${rank}</p>`;
}

async function updateProfile(){
  const newUsername=document.getElementById("new-username").value.trim();
  if(!newUsername) return alert("Enter a username");
  await supabaseClient.from("profiles").update({username:newUsername}).eq("id",currentUser.id);
  alert("Profile updated");
  loadAccount();
}

function logout(){supabaseClient.auth.signOut();window.location.href="login.html";}
loadAccount();
</script>
</body>
</html>
