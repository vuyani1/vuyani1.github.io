<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Account - TyVila</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-indigo-900 via-purple-800 to-pink-700 flex items-center justify-center h-screen">
  <div class="bg-white shadow-xl rounded-2xl p-10 w-full max-w-md text-center">
    <img id="profilePic" class="mx-auto w-24 h-24 rounded-full border-4 border-indigo-500 mb-4" src="" alt="Profile">
    <h1 id="username" class="text-2xl font-bold text-gray-800"></h1>
    <p id="email" class="text-gray-600 mb-4"></p>
    <p id="points" class="text-lg font-semibold text-indigo-600"></p>
    <p id="rank" class="text-sm text-gray-500 mb-6"></p>

    <button onclick="window.location.href='games.html'" class="w-full py-3 bg-green-500 hover:bg-green-600 text-white font-semibold rounded-xl shadow-md transition">
      🎮 Play Games
    </button>
  </div>

  <script>
    const supabase = supabase.createClient("https://wwcedhbbbdoyrmquokyjj.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4");

    async function loadProfile() {
      const { data: { user } } = await supabase.auth.getUser();
      if (!user) return window.location.href = "signup.html";

      const { data, error } = await supabase
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

      if (error || !data) {
        return window.location.href = "signup.html";
      }

      document.getElementById("username").innerText = data.username;
      document.getElementById("email").innerText = data.email;
      document.getElementById("profilePic").src = data.avatar_url || "https://api.dicebear.com/9.x/adventurer/svg";
      document.getElementById("points").innerText = "Points: " + (data.points || 0);
      document.getElementById("rank").innerText = "Rank: " + (data.rank || "Beginner");
    }

    loadProfile();
  </script>
</body>
</html>
