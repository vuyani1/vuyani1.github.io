<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TyVila Live Admin</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<style>
body { margin:0; background:#0d0d12; color:#fff; font-family:sans-serif; }
header { padding:15px; background:#111; display:flex; justify-content:space-between; align-items:center; }
main { max-width:600px; margin:30px auto; background:#1a1a2e; padding:20px; border-radius:12px; }
label { display:block; margin-top:15px; }
input, select { width:100%; padding:8px; margin-top:5px; border-radius:6px; border:none; }
button { margin-top:15px; padding:10px 20px; border:none; border-radius:8px; background:#0af; color:#fff; cursor:pointer; }
#status { margin-top:20px; font-size:14px; color:#0af; }
</style>
</head>
<body>
<header>
  <h1>TyVila Live Admin</h1>
</header>
<main>
  <h2>Stream Control</h2>
  <label>Source Type</label>
  <select id="sourceType">
    <option value="link">Link</option>
    <option value="file">File</option>
  </select>
  <div id="linkInput">
    <label>Video Link</label>
    <input type="text" id="videoLink" placeholder="Enter video URL">
  </div>
  <div id="fileInput" style="display:none">
    <label>Upload File</label>
    <input type="file" id="videoFile">
  </div>
  <button id="startBtn">Start Live</button>
  <button id="stopBtn">Stop Live</button>
  <div id="status">Status: standby</div>
</main>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://wwcedhbbdoyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
);

let currentStream;

document.getElementById("sourceType").onchange=()=>{
  const val=document.getElementById("sourceType").value;
  document.getElementById("linkInput").style.display=val==="link"?"block":"none";
  document.getElementById("fileInput").style.display=val==="file"?"block":"none";
}

async function createStream(sourceType, url) {
  const { data, error } = await supabase.from("tylive_streams").insert({
    admin_id: (await supabase.auth.getUser()).data.user?.id,
    source_type: sourceType,
    source_url: url,
    status: "live"
  }).select().single();
  currentStream=data;
  document.getElementById("status").innerText="Status: live";
}

document.getElementById("startBtn").onclick=async()=>{
  const type=document.getElementById("sourceType").value;
  if(type==="link"){
    const url=document.getElementById("videoLink").value.trim();
    if(!url) return;
    await createStream("link",url);
  } else {
    const file=document.getElementById("videoFile").files[0];
    if(!file) return;
    const { data, error } = await supabase.storage.from("tylive").createSignedUploadUrl(file.name);
    if(error) return;
    await fetch(data.signedUrl,{method:"PUT",headers:{"Content-Type":file.type},body:file});
    const publicUrl=`https://wwcedhbbdoyrmquokyjj.supabase.co/storage/v1/object/public/tylive/${file.name}`;
    await createStream("file",publicUrl);
  }
}

document.getElementById("stopBtn").onclick=async()=>{
  if(!currentStream) return;
  await supabase.from("tylive_streams").update({status:"ended",ended_at:new Date().toISOString()}).eq("id",currentStream.id);
  document.getElementById("status").innerText="Status: ended";
}
</script>
</body>
</html>
