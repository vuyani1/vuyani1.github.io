
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TyVila Sign Up</title>
  <link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background:#0a0a0a; color:white; display:flex; justify-content:center; align-items:center; height:100vh; }
    .signup-card { background:#1e1e1e; padding:30px; border-radius:16px; width:350px; box-shadow:0 0 20px rgba(255,102,0,0.5); }
    .signup-card h2 { text-align:center; margin-bottom:20px; }
    .signup-card input { width:100%; padding:10px; margin-bottom:15px; border-radius:8px; border:none; }
    .signup-card button { width:100%; padding:10px; background:#ff6600; border:none; border-radius:8px; color:white; cursor:pointer; font-size:16px; }
    .signup-card button:hover { background:#e65c00; }
  </style>
</head>
<body>

<div class="signup-card">
  <h2>Sign Up</h2>
  <input type="text" id="username" placeholder="Username" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <input type="file" id="profilePic" accept="image/*">
  <button onclick="signup()">Sign Up</button>
  <p id="message" style="color:red; text-align:center;"></p>
</div>

<script>
  const supabaseUrl = "https://wwcedhbbdoyrmquokyjj.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cmxxeWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4";
  const supabase = supabase.createClient(supabaseUrl, supabaseKey);

  async function signup() {
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const profilePicFile = document.getElementById("profilePic").files[0];

    if (!username || !email || !password) {
      document.getElementById("message").textContent = "All fields are required!";
      return;
    }

    const { data: existing } = await supabase.from("profiles").select("username").eq("username", username);
    if(existing.length > 0){
      document.getElementById("message").textContent = "Username already taken!";
      return;
    }

    const { data, error } = await supabase.auth.signUp({
      email: email,
      password: password
    });

    if (error) {
      document.getElementById("message").textContent = error.message;
      return;
    }

    let profilePicUrl = "";
    if(profilePicFile){
      const fileExt = profilePicFile.name.split('.').pop();
      const fileName = `${username}_${Date.now()}.${fileExt}`;
      const { data: uploadData, error: uploadError } = await supabase.storage.from('profiles').upload(fileName, profilePicFile);
      if(uploadError){
        document.getElementById("message").textContent = "Profile picture upload failed";
      } else {
        profilePicUrl = supabase.storage.from('profiles').getPublicUrl(fileName).data.publicUrl;
      }
    }

    const { error: profileError } = await supabase.from("profiles").insert([{
      id: data.user.id,
      username: username,
      bio: "",
      points: 0,
      rank: "Beginner",
      profile_pic: profilePicUrl,
      banned: false,
      suspended_until: null
    }]);

    if(profileError){
      document.getElementById("message").textContent = profileError.message;
      return;
    }

    alert("Account created successfully!");
    window.location.href = "login.html";
  }
</script>

</body>
</html>
