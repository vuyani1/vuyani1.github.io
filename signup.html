<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up - TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<meta name="description" content="Create a TyVila account to play games, earn points, chat, and more.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg1:#071029;--bg2:#071822;--card:rgba(255,255,255,0.03);--accent:linear-gradient(90deg,#7c3aed,#06b6d4);--glass:rgba(255,255,255,0.03);--muted:#9fb3c8}
html,body{height:100%;margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Arial;color:#e6f0f8}
body{background:radial-gradient(1200px 600px at 10% 10%, rgba(124,58,237,0.12), transparent),radial-gradient(900px 500px at 90% 90%, rgba(6,182,212,0.07), transparent),linear-gradient(180deg,var(--bg1),var(--bg2));display:grid;place-items:center;padding:28px}
.card{background:var(--card);padding:28px;border-radius:16px;box-shadow:0 8px 30px rgba(2,6,23,0.6);backdrop-filter: blur(6px);max-width:400px;width:100%}
h1{margin:0 0 12px 0;font-size:28px;text-align:center}
label{display:block;font-size:13px;color:var(--muted);margin-top:12px}
input{width:100%;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit;margin-top:8px;font-size:15px}
button.primary{margin-top:18px;width:100%;padding:12px;border-radius:12px;border:0;color:white;background-image:var(--accent);cursor:pointer;font-weight:600;font-size:15px}
.row{display:flex;gap:12px;margin-top:12px;align-items:center;justify-content:center}
.link{color:#cfeffd;text-decoration:none;font-size:14px}
.error{color:#ff7777;margin-top:10px;text-align:center}
</style>
</head>
<body>
<div class="card">
<h1>Create Account</h1>
<form id="signupForm">
<label for="email">Email</label>
<input type="email" id="email" required placeholder="you@example.com">
<label for="username">Username</label>
<input type="text" id="username" required placeholder="Choose a unique username">
<label for="password">Password</label>
<input type="password" id="password" required placeholder="Enter password">
<label for="profile_pic">Profile Picture URL</label>
<input type="url" id="profile_pic" placeholder="https://example.com/avatar.png">
<label for="extra">Favorite Game (Optional)</label>
<input type="text" id="extra" placeholder="Your favorite game">
<button type="submit" class="primary">Sign Up</button>
<div class="error" id="errorMsg"></div>
<div class="row"><a class="link" href="login.html">Already have an account? Sign In</a></div>
</form>
</div>
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient(
'https://wwcedhbbdoyrmquokyjj.supabase.co',
'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4'
)
document.getElementById('signupForm').addEventListener('submit', async (e)=>{
e.preventDefault()
const email=document.getElementById('email').value.trim()
const username=document.getElementById('username').value.trim()
const password=document.getElementById('password').value
const profile_pic=document.getElementById('profile_pic').value.trim()
const extra=document.getElementById('extra').value.trim()
document.getElementById('errorMsg').textContent=''

if(!email||!username||!password){document.getElementById('errorMsg').textContent='Fill all required fields';return}

const { data: existing, error: eErr } = await supabase.from('profiles').select('id').eq('username', username).maybeSingle()
if(eErr){document.getElementById('errorMsg').textContent='Error checking username';return}
if(existing){document.getElementById('errorMsg').textContent='Username already taken';return}

const { data, error } = await supabase.auth.signUp({email,password})
if(error){document.getElementById('errorMsg').textContent=error.message;return}

const userId=data.user.id
await supabase.from('profiles').insert([{id:userId, username, profile_pic, extra, points:0, rank:0, banned:false, suspended_until:null}])
window.location.href='account.html'
})
</script>
</body>
</html>
