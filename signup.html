<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TyVila Signup</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-gray-900 via-purple-900 to-indigo-900 flex items-center justify-center h-screen">
  <div class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-md text-center">
    <img src="https://www.tyvila.online/cdn/ty.webp" alt="TyVila" class="mx-auto w-24 mb-6">
    <h1 class="text-3xl font-bold text-gray-800 mb-4">Welcome to TyVila</h1>
    <p class="text-gray-600 mb-6">Sign up with Google to get started</p>
    
    <button id="googleLogin" class="w-full py-3 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-xl shadow-md transition">
      Continue with Google
    </button>

    <div id="usernameSection" class="hidden mt-6">
      <p class="text-gray-700 mb-2">Choose a unique username:</p>
      <input id="usernameInput" type="text" placeholder="Your username" class="w-full p-3 border rounded-xl mb-4">
      <button id="saveUsername" class="w-full py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-semibold rounded-xl shadow-md transition">
        Save Username
      </button>
    </div>
  </div>

  <script>
    const supabase = supabase.createClient("https://wwcedhbbbdoyrmquokyjj.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4");

    document.getElementById("googleLogin").onclick = async () => {
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href }
      });
      if (error) alert(error.message);
    };

    async function checkUser() {
      const { data: { user } } = await supabase.auth.getUser();
      if (user) {
        const { data: existing } = await supabase
          .from("profiles")
          .select("*")
          .eq("id", user.id)
          .single();

        if (!existing) {
          document.getElementById("usernameSection").classList.remove("hidden");
        } else {
          window.location.href = "account.html";
        }
      }
    }
    checkUser();

    document.getElementById("saveUsername").onclick = async () => {
      const { data: { user } } = await supabase.auth.getUser();
      const username = document.getElementById("usernameInput").value.trim();
      if (!username) return alert("Enter a username");

      const { error } = await supabase.from("profiles").insert({
        id: user.id,
        email: user.email,
        username: username,
        avatar_url: user.user_metadata.avatar_url,
        points: 0,
        rank: 'Beginner'
      });

      if (error) {
        alert("Error: " + error.message);
      } else {
        window.location.href = "account.html";
      }
    };
  </script>
</body>
</html>
