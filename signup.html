<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Signup — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;display:flex;align-items:center;justify-content:center;height:100vh;font-family:'Inter',sans-serif;background:linear-gradient(180deg,#050510,#0c0c1a);color:#fff}
.container{width:95%;max-width:420px;background:rgba(15,15,35,.9);padding:30px;border-radius:20px;text-align:center}
h1{font-family:'Press Start 2P',cursive;font-size:22px;margin-bottom:20px;background:linear-gradient(90deg,#7c3aed,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:none;font-size:15px}
input{background:rgba(255,255,255,.08);color:#fff}
button{cursor:pointer;font-weight:600;color:#fff;background:linear-gradient(90deg,#7c3aed,#06b6d4)}
button:hover{transform:scale(1.05)}
.google-btn{background:#fff;color:#333;display:flex;align-items:center;justify-content:center;gap:10px;font-weight:600}
.error-msg{color:#ff4d6d}
</style>
</head>
<body>
<div class="container">
  <h1>🚀 Create Account</h1>
  <form id="signupForm">
    <input id="email" type="email" placeholder="Email" required>
    <input id="password" type="password" placeholder="Password" required>
    <input id="username" type="text" placeholder="Choose unique username" required>
    <button type="submit">✅ Sign up</button>
  </form>
  <br>
  <button class="google-btn" id="googleSignup">🔑 Sign up with Google</button>
  <div class="error-msg" id="signupError"></div>
  <p>Already have an account? <a href="login.html" style="color:#06b6d4">Login</a></p>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase=createClient(
 "https://wwcedhbbdoyrmquokyjj.supabase.co",
 "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

document.getElementById("signupForm").addEventListener("submit",async e=>{
 e.preventDefault()
 const email=document.getElementById("email").value
 const pw=document.getElementById("password").value
 const username=document.getElementById("username").value.trim()
 const err=document.getElementById("signupError"); err.textContent=""

 const {data,error}=await supabase.auth.signUp({email,password:pw})
 if(error){err.textContent=error.message;return}
 if(data.user){
   await supabase.from("profiles").insert({id:data.user.id,email,username,points:0})
   alert("Check your email for confirmation!");window.location.href="login.html"
 }
})

document.getElementById("googleSignup").addEventListener("click",async()=>{
 const {error}=await supabase.auth.signInWithOAuth({
   provider:"google",
   options:{redirectTo:"https://www.tyvila.online/account.html"}
 })
 if(error) alert(error.message)
})

document.addEventListener("contextmenu",e=>e.preventDefault())
document.onkeydown=e=>{
 if(e.keyCode==123|| (e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key.toUpperCase()))|| (e.ctrlKey&&e.key.toUpperCase()=='U')) return false
}
</script>
</body>
</html>
