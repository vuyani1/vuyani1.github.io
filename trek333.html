<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Magic Link — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg1:#0a0a0f; --bg2:#0d0d1a; --accent:linear-gradient(90deg,#7c3aed,#06b6d4);
  --muted:#9fb3c8; --card-bg:rgba(255,255,255,0.03);
}
body{margin:0;font-family:'Inter',sans-serif;color:white;background:radial-gradient(1200px 600px at 10% 10%, rgba(124,58,237,0.12), transparent),radial-gradient(900px 500px at 90% 90%, rgba(6,182,212,0.07), transparent),linear-gradient(180deg,var(--bg1),var(--bg2));display:flex;justify-content:center;align-items:center;height:100vh;padding:12px;}
.card{background:var(--card-bg);padding:40px;border-radius:20px;text-align:center;max-width:400px;width:100%;}
h1{margin-bottom:12px;}
input{width:100%;padding:14px;margin:8px 0;border-radius:12px;border:none;background: rgba(255,255,255,0.05);color:white;font-size:16px;}
button{padding:14px;border-radius:12px;border:none;font-size:16px;font-weight:700;color:white;background-image: var(--accent);cursor:pointer;transition: all 0.3s ease;margin-top:12px;}
button:hover{transform: scale(1.05);}
.error-msg{color:#ff7777;margin-top:8px;min-height:18px;}
.success-msg{color:#7cf59b;margin-top:8px;min-height:18px;}
</style>
</head>
<body>
<div class="card">
<h1>Processing...</h1>
<div class="error-msg" id="error"></div>
<div class="success-msg" id="success"></div>
<div id="resetForm" style="display:none;">
  <input type="password" id="newPassword" placeholder="Enter new password">
  <button id="setPasswordBtn">Set New Password</button>
</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient(
  'https://wwcedhbbdoyrmquokyjj.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4'
)
const urlParams = new URLSearchParams(window.location.search)
const token = urlParams.get('ref')
const errorDiv = document.getElementById('error')
const successDiv = document.getElementById('success')
const resetForm = document.getElementById('resetForm')
const newPasswordInput = document.getElementById('newPassword')
const setPasswordBtn = document.getElementById('setPasswordBtn')

if(!token){ errorDiv.textContent='Invalid link'; throw new Error('No token'); }

async function processToken(){
  const { data: linkData, error } = await supabase.from('magic_links').select('*').eq('token',token).maybeSingle()
  if(error || !linkData){ errorDiv.textContent='Invalid or expired link'; return }
  if(new Date(linkData.expires) < new Date()){ errorDiv.textContent='This link has expired'; return }

  const { email } = linkData
  const { data: profile } = await supabase.from('profiles').select('*').eq('email',email).maybeSingle()
  if(!profile){ errorDiv.textContent='No account associated'; return }

  if(!profile.email_confirmed_at){
    await supabase.from('profiles').update({email_confirmed_at:new Date().toISOString()}).eq('id',profile.id)
    successDiv.textContent='Email confirmed! Redirecting to login...'
    setTimeout(()=>window.location.href='login.html',2000)
  } else {
    resetForm.style.display='block'
    successDiv.textContent='Enter a new password to reset your account password.'
  }
}

setPasswordBtn.addEventListener('click', async ()=>{
  const newPass = newPasswordInput.value.trim()
  if(!newPass){ errorDiv.textContent='Enter a new password'; return }
  const { data: linkData } = await supabase.from('magic_links').select('*').eq('token',token).maybeSingle()
  const { email } = linkData
  const { data: user } = await supabase.auth.api.getUserByEmail(email)
  await supabase.auth.admin.updateUserById(user.id,{password:newPass})
  successDiv.textContent='Password updated! Redirecting to login...'
  errorDiv.textContent=''
  setTimeout(()=>window.location.href='login.html',1500)
})

processToken()
</script>
</body>
</html>
