<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Confirm Email — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<style>
body{margin:0;font-family:'Inter',sans-serif;background:#0a0a0f;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
.card{background:rgba(255,255,255,0.03);padding:40px;border-radius:20px;text-align:center;max-width:400px;width:100%;}
button{padding:14px;border-radius:12px;border:none;background:linear-gradient(90deg,#7c3aed,#06b6d4);color:white;font-weight:700;cursor:pointer;margin-top:20px;}
</style>
</head>
<body>
<div class="card">
<h1>Confirm Your Email</h1>
<p id="msg">Checking verification status...</p>
<button id="resendBtn" style="display:none;">Resend Confirmation Link</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://wwcedhbbdoyrmquokyjj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4')
const urlParams = new URLSearchParams(window.location.search)
const email = urlParams.get('email')
const msgDiv = document.getElementById('msg')
const resendBtn = document.getElementById('resendBtn')

async function checkEmail(){
  const { data, error } = await supabase.from('profiles').select('*').eq('email',email).maybeSingle()
  if(error || !data){ msgDiv.textContent='No account found, redirecting to signup...'; setTimeout(()=>window.location.href='signup.html',2000); return }
  if(data.email_confirmed_at){ msgDiv.textContent='Email confirmed! Redirecting to login...'; setTimeout(()=>window.location.href='login.html',1500); return }
  msgDiv.textContent='Email not confirmed. Check inbox or resend link.'
  resendBtn.style.display='inline-block'
}

resendBtn.addEventListener('click', async ()=>{
  const token = Math.floor(Math.random()*1e18)+Date.now()
  const expires = new Date(Date.now()+2*60*1000).toISOString()
  await supabase.from('magic_links').insert([{email,token,expires}])
  await supabase.functions.invoke('send_magic_link',{body:{email,link:`https://www.tyvila.online/trek333.html?ref=${token}`}})
  msgDiv.textContent='Confirmation link sent! Expires in 2 minutes.'
})

checkEmail()
</script>
</body>
</html>
