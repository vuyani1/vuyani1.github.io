<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Games — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg,#050510,#0c0c1a);
  color: white; margin: 0; padding: 0;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 20px; background: rgba(255,255,255,.05);
  border-bottom: 1px solid rgba(255,255,255,.1);
}
header img {
  width: 50px; height: 50px; border-radius: 50%; margin-right: 10px;
}
.user-info { display: flex; align-items: center; gap: 15px; }
h1 { font-size: 22px; }
.games-grid {
  display: grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
  gap: 20px; padding: 20px;
}
.game-card {
  background: rgba(255,255,255,.07);
  padding: 20px; border-radius: 15px;
  box-shadow: 0 0 15px rgba(124,58,237,.3);
  text-align: center;
}
.game-card img {
  width: 100%; border-radius: 10px; margin-bottom: 10px;
}
button.like-btn {
  background: linear-gradient(90deg,#7c3aed,#06b6d4);
  border: none; padding: 10px 20px;
  border-radius: 10px; cursor: pointer; color: white; font-weight: 600;
}
</style>
</head>
<body>
<header>
  <div class="user-info">
    <img id="userPic" src="https://www.tyvila.online/cdn/ty.webp" alt="Profile">
    <div>
      <h1 id="username">Loading...</h1>
      <small id="userEmail"></small><br>
      <small>Points: <span id="userPoints">0</span></small>
    </div>
  </div>
</header>
<main>
  <div class="games-grid" id="gamesGrid"></div>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient(
 "https://wwcedhbbdoyrmquokyjj.supabase.co",
 "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
)

// Check session
const { data: { session } } = await supabase.auth.getSession()
if(!session) window.location.href="login.html"

// Load user
const user = session.user
const { data: profile } = await supabase.from("profiles").select("*").eq("id", user.id).maybeSingle()
if(profile){
  document.getElementById("username").textContent = profile.username
  document.getElementById("userEmail").textContent = profile.email
  document.getElementById("userPoints").textContent = profile.points || 0
  document.getElementById("userPic").src = profile.avatar_url || user.user_metadata.picture || "https://www.tyvila.online/cdn/ty.webp"
}

// Load games
async function loadGames(){
  const { data } = await supabase.from("games").select("*")
  const grid = document.getElementById("gamesGrid")
  grid.innerHTML=""
  data.forEach(game=>{
    const div=document.createElement("div")
    div.className="game-card"
    div.innerHTML=`
      <img src="${game.image_url}" alt="${game.title}">
      <h2>${game.title}</h2>
      <p>Likes: <span id="likes-${game.id}">${game.likes||0}</span></p>
      <button class="like-btn" onclick="likeGame('${game.id}')">👍 Like</button>
    `
    grid.appendChild(div)
  })
}
loadGames()

// Like Game
window.likeGame=async(id)=>{
  const { data, error } = await supabase.rpc("increment_likes",{gid:id})
  if(!error){
    document.getElementById(`likes-${id}`).textContent=data
  }
}
</script>
</body>
</html>
