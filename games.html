<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TyVila Games</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico" type="image/x-icon">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg1:#050510;
      --bg2:#0c0c1a;
      --card:#151528;
      --neon1:#7c3aed;
      --neon2:#06b6d4;
      --accent:#ffb800;
      --success:#32ff91;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:'Inter',sans-serif;
      background:radial-gradient(circle at top,var(--bg1),var(--bg2));
      color:white;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:20px;
      background-attachment:fixed;
    }
    header{
      width:100%;max-width:1100px;
      display:flex;align-items:center;justify-content:space-between;
      padding:15px 25px;margin-bottom:30px;
      background:rgba(20,20,40,0.85);
      backdrop-filter:blur(12px);
      border-radius:20px;
      border:2px solid transparent;
      border-image:linear-gradient(90deg,var(--neon1),var(--neon2)) 1;
      box-shadow:0 0 25px rgba(124,58,237,.35),0 0 40px rgba(6,182,212,.25);
    }
    header img.logo{height:42px}
    .profile{display:flex;align-items:center;gap:15px}
    .profile img{
      width:60px;height:60px;border-radius:50%;
      border:3px solid var(--neon2);object-fit:cover;
      box-shadow:0 0 12px var(--neon2);
    }
    .profile-info{display:flex;flex-direction:column;line-height:1.2}
    .profile-info span{font-size:15px;font-weight:600}
    .rank{font-size:13px;color:var(--accent)}
    .points{font-size:13px;color:var(--success)}
    h2{
      font-size:26px;margin-bottom:20px;
      background:linear-gradient(90deg,var(--neon1),var(--neon2));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      text-align:center;font-weight:700;
    }
    .games-list{
      width:100%;max-width:1100px;
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:25px;
      margin-bottom:40px;
    }
    .game-card{
      background:linear-gradient(145deg,rgba(20,20,40,0.95),rgba(10,10,25,0.95));
      border-radius:18px;
      padding:22px;text-align:center;
      border:1px solid rgba(255,255,255,0.08);
      transition:.3s;cursor:pointer;
      position:relative;overflow:hidden;
    }
    .game-card::before{
      content:"";position:absolute;inset:0;
      background:linear-gradient(120deg,var(--neon1),var(--neon2));
      opacity:0;transition:.3s;
    }
    .game-card:hover::before{opacity:.1}
    .game-card:hover{transform:translateY(-7px) scale(1.02);box-shadow:0 0 20px var(--neon2)}
    .game-card h3{font-size:19px;margin-bottom:12px}
    .likes{margin-top:10px;font-size:14px;color:#ccc}
    .logout-btn{
      padding:9px 16px;
      background:linear-gradient(90deg,var(--neon1),var(--neon2));
      border:none;border-radius:12px;
      color:white;font-weight:600;cursor:pointer;
      transition:.25s;box-shadow:0 0 12px var(--neon1);
    }
    .logout-btn:hover{transform:scale(1.08);box-shadow:0 0 20px var(--neon2)}
    footer{
      width:100%;max-width:1100px;
      padding:15px;margin-top:auto;
      text-align:center;font-size:14px;
      color:#aaa;opacity:.7;
    }
    @media(max-width:600px){
      header{flex-direction:column;gap:15px;text-align:center}
      .profile{flex-direction:column}
      .profile img{width:70px;height:70px}
      h2{font-size:22px}
    }
  </style>
</head>
<body>
  <header>
    <img src="https://www.tyvila.online/cdn/ty.webp" class="logo" alt="TyVila">
    <div class="profile">
      <img id="avatar" src="" alt="Profile">
      <div class="profile-info">
        <span id="username"></span>
        <span class="points" id="points"></span>
        <span class="rank" id="rank"></span>
      </div>
      <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>
  </header>

  <h2>🎮 Your Games 🎮</h2>
  <div class="games-list" id="gamesList"></div>

  <footer>© 2025 TyVila. All rights reserved.</footer>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
    const supabase = createClient(
      "https://wwcedhbbdoyrmquokyjj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
    )

    async function loadUser(){
      const { data:{ user } } = await supabase.auth.getUser()
      if(!user){ window.location.href="login.html"; return }
      const { data:profile } = await supabase.from("leaderboard").select("*").eq("id",user.id).single()
      if(!profile){ return }

      document.getElementById("username").textContent = profile.username
      document.getElementById("points").textContent = `⭐ ${profile.points} points`
      document.getElementById("rank").textContent = profile.rank === 1 ? "👑 Top Player" : `Rank #${profile.rank}`
      document.getElementById("avatar").src = profile.avatar_url || `https://api.dicebear.com/9.x/identicon/svg?seed=${profile.username}`

      loadGames(user.id)
    }

    async function loadGames(userId){
      const { data:games } = await supabase.from("games").select("*").eq("user_id",userId).order("played_at",{ascending:false})
      const container=document.getElementById("gamesList")
      container.innerHTML=""
      if(!games || games.length===0){
        container.innerHTML="<p>No games played yet.</p>"
        return
      }
      games.forEach(g=>{
        const div=document.createElement("div")
        div.className="game-card"
        div.innerHTML=`
          <h3>${g.game_name}</h3>
          <div class="likes">👍 ${g.likes} likes</div>
        `
        container.appendChild(div)
      })
    }

    document.getElementById("logoutBtn").addEventListener("click", async ()=>{
      await supabase.auth.signOut()
      window.location.href="login.html"
    })

    loadUser()
    document.addEventListener("contextmenu",e=>e.preventDefault())
    document.onkeydown=e=>{
      if(e.keyCode==123||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key.toUpperCase()))||(e.ctrlKey&&e.key.toUpperCase()=='U')) return false
    }
  </script>
</body>
</html>
