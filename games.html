<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TyVila Games</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<meta id="meta-title" property="og:title" content="TyVila Games">
<meta id="meta-desc" property="og:description" content="Play and compete on TyVila Games!">
<meta id="meta-image" property="og:image" content="https://www.tyvila.online/cdn/ty-gameslogo.webp">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1:#050510; --bg2:#0c0c1a;
  --neon1:#7c3aed; --neon2:#06b6d4;
  --error:#ff4d6d; --success:#32ff91;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  color:white; min-height:100vh;
  display:flex; flex-direction:column;
}
header{
  display:flex; align-items:center; justify-content:space-between;
  padding:15px 25px; background:rgba(15,15,35,.9);
  border-bottom:2px solid transparent;
  border-image:linear-gradient(90deg,var(--neon1),var(--neon2)) 1;
}
.header-title{
  font-family:'Press Start 2P',cursive;
  font-size:20px; text-align:center;
  background:linear-gradient(90deg,var(--neon1),var(--neon2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:flex; align-items:center; gap:10px;
}
.header-title img{height:40px}
.profile-section{display:flex;align-items:center;gap:10px}
.profile-avatar img{width:45px;height:45px;border-radius:50%;border:2px solid var(--neon2)}
.profile-avatar i{font-size:40px;color:var(--neon2)}
.profile-info{display:flex;flex-direction:column}
.profile-name{font-weight:700}
.profile-stats{font-size:13px;color:#ccc}
.header-actions .header-button{
  padding:8px 14px;border:none;border-radius:8px;
  background:linear-gradient(90deg,var(--neon1),var(--neon2));
  color:white;cursor:pointer;font-weight:600;
}
.main-content{flex:1;padding:30px;max-width:1100px;margin:auto;width:100%}
.section-title{
  font-size:18px;margin-bottom:15px;
  background:linear-gradient(90deg,var(--neon1),var(--neon2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  font-family:'Press Start 2P',cursive;
}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}
.game-card{
  background:rgba(255,255,255,.05);border-radius:15px;overflow:hidden;
  cursor:pointer;transition:.2s;display:flex;flex-direction:column
}
.game-card:hover{transform:scale(1.05);box-shadow:0 0 20px var(--neon2)}
.game-card-image{width:100%;height:130px;object-fit:cover}
.game-card-content{padding:10px;flex:1}
.game-card-title{font-weight:700;font-size:16px;margin-bottom:5px}
.game-card-desc{font-size:13px;color:#bbb;margin-bottom:8px}
.game-card-stats{display:flex;gap:15px;font-size:12px;color:#aaa}
.top-games{margin-top:40px}
.top-games-header{display:flex;align-items:center;justify-content:center;gap:10px;font-size:22px;color:gold}
.top-list{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap}
.top-card{flex:1;min-width:220px;background:rgba(255,255,255,.05);border-radius:15px;overflow:hidden;position:relative}
.top-card img{width:100%;height:120px;object-fit:cover}
.top-card-content{padding:10px}
.crown{position:absolute;top:10px;left:10px;font-size:24px}
#gameModal{
  display:none;position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.85);z-index:1000;align-items:center;justify-content:center
}
.modal-content{
  width:90%;max-width:1100px;background:#111;border-radius:15px;overflow:hidden;display:flex;flex-direction:column
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 18px;background:linear-gradient(90deg,var(--neon1),var(--neon2));
}
.modal-header h2{font-size:18px}
.modal-body{display:flex;flex-direction:row;height:600px}
#gameFrame{flex:3;border:none;width:100%}
#gameSide{flex:1;background:#0b0b18;display:flex;flex-direction:column;justify-content:space-between;padding:15px}
#gameActions button{
  width:100%;margin-bottom:10px;padding:10px;border:none;border-radius:8px;
  background:linear-gradient(90deg,var(--neon1),var(--neon2));
  color:white;cursor:pointer;font-weight:600
}
#likeCount{margin-top:auto;font-size:14px;text-align:center;color:#ccc}
.close-modal{background:none;border:none;color:white;font-size:20px;cursor:pointer}
.point-notification{
  position:fixed;top:20px;right:20px;background:var(--success);
  padding:8px 14px;border-radius:8px;display:none;z-index:2000;font-weight:700
}
</style>
<script>
document.addEventListener("contextmenu",e=>e.preventDefault());
document.addEventListener("keydown",e=>{
  if(e.ctrlKey && ["u","s","i","j","c"].includes(e.key.toLowerCase())) e.preventDefault();
});
</script>
</head>
<body>
<header>
  <div class="profile-section">
    <div class="profile-avatar" id="profileAvatar"><i class="fas fa-user"></i></div>
    <div class="profile-info">
      <div class="profile-name" id="profileName">Player</div>
      <div class="profile-stats" id="profileStats">Points: 0 | Rank: Member</div>
    </div>
  </div>
  <h1 class="header-title">
    <img src="https://www.tyvila.online/cdn/ty-gameslogo.webp" alt="TyVila Games Logo"> TyVila Games
  </h1>
  <div class="header-actions">
    <button class="header-button" onclick="window.location.href='account.html'"><i class="fas fa-user-circle"></i> Account</button>
  </div>
</header>

<div class="main-content">
  <h2 class="section-title">Available Games</h2>
  <div class="games-grid" id="gamesList"></div>

  <div class="top-games">
    <div class="top-games-header"><i class="fas fa-crown"></i><h2 class="section-title">Crown Games</h2><i class="fas fa-crown"></i></div>
    <div class="top-list" id="topList"></div>
  </div>
</div>

<div id="gameModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="gameTitle"></h2>
      <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <iframe id="gameFrame"></iframe>
      <div id="gameSide">
        <div id="gameActions">
          <button onclick="likeGame()"><i class="fas fa-thumbs-up"></i> Like</button>
          <button onclick="shareGame()"><i class="fas fa-share"></i> Share</button>
          <button onclick="fullscreenGame()"><i class="fas fa-expand"></i> Fullscreen</button>
          <button onclick="closeModal()"><i class="fas fa-door-open"></i> Exit</button>
        </div>
        <div class="like-count" id="likeCount"></div>
      </div>
    </div>
  </div>
</div>

<div class="point-notification" id="pointNotification">+1 Point!</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase=createClient("https://wwcedhbbdoyrmquokyjj.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4")

let currentUser,currentProfile,currentGame,timer,isFullscreen=false

async function checkAuth(){
  const {data:{user}}=await supabase.auth.getUser()
  if(!user){window.location.href="login.html";return}
  currentUser=user
  let {data:profile}=await supabase.from("profiles")
    .select("username,points,email,rank,avatar_url")
    .eq("id",user.id).single()
  if(!profile){
    const {data:newProfile}=await supabase.from("profiles").insert({
      id:user.id,email:user.email,
      username:user.user_metadata?.preferred_username||user.email.split("@")[0],
      avatar_url:user.user_metadata?.avatar_url||user.user_metadata?.picture,
      points:0,rank:"Member"
    }).select().single()
    profile=newProfile
  }
  currentProfile=profile
  document.getElementById("profileName").innerText=currentProfile.username
  document.getElementById("profileStats").innerText=`Points: ${currentProfile.points} | ${currentProfile.rank}`
  if(currentProfile.avatar_url){
    document.getElementById("profileAvatar").innerHTML=`<img src="${currentProfile.avatar_url}">`
  }
}
checkAuth()

async function addPoints(amount){
  currentProfile.points+=amount
  document.getElementById("profileStats").innerText=`Points: ${currentProfile.points} | ${currentProfile.rank}`
  await supabase.from("profiles").update({points:currentProfile.points}).eq("id",currentUser.id)
  const notif=document.getElementById("pointNotification")
  notif.textContent=`+${amount} Point${amount>1?'s':''}!`
  notif.style.display="block"; setTimeout(()=>notif.style.display="none",2000)
}

async function loadGames(){
  const {data}=await supabase.from("games").select("*").order("id")
  const container=document.getElementById("gamesList")
  container.innerHTML=""
  data.forEach(g=>{
    const div=document.createElement("div")
    div.className="game-card"
    div.innerHTML=`
      <img src="${g.image}" class="game-card-image">
      <div class="game-card-content">
        <h3 class="game-card-title">${g.title}</h3>
        <p class="game-card-desc">${g.description||''}</p>
        <div class="game-card-stats">
          <span><i class="fas fa-thumbs-up"></i> ${g.likes||0}</span>
          <span><i class="fas fa-play-circle"></i> ${g.played||0}</span>
        </div>
      </div>`
    div.onclick=()=>playGame(g)
    container.appendChild(div)
  })
  loadTopGames()
}

async function loadTopGames(){
  const {data}=await supabase.from("games").select("*").order("played",{ascending:false}).limit(3)
  const top=document.getElementById("topList")
  top.innerHTML=""
  data.forEach((g,i)=>{
    const card=document.createElement("div")
    card.className="top-card"
    card.innerHTML=`
      ${i===0?'<div class="crown">👑</div>':""}
      <img src="${g.image}">
      <div class="top-card-content">
        <h4 class="top-card-title">${g.title}</h4>
        <div class="top-card-stats">
          <span><i class="fas fa-thumbs-up"></i> ${g.likes||0}</span>
          <span><i class="fas fa-play-circle"></i> ${g.played||0}</span>
        </div>
      </div>`
    top.appendChild(card)
  })
}

async function playGame(g){
  currentGame=g
  document.getElementById("gameTitle").innerText=g.title
  document.getElementById("gameFrame").src=g.embed
  document.getElementById("gameModal").style.display="flex"
  document.body.style.overflow="hidden"
  updateLikes()
  g.played=(g.played||0)+1
  await supabase.from("games").update({played:g.played}).eq("id",g.id)
  addPoints(10)
  timer=setInterval(()=>addPoints(1),1000)
  document.getElementById("meta-title").content=`Play ${g.title} — TyVila`
  document.getElementById("meta-desc").content=g.description||"Play on TyVila!"
  document.getElementById("meta-image").content=g.image
}

function closeModal(){
  document.getElementById("gameModal").style.display="none"
  document.getElementById("gameFrame").src=""
  clearInterval(timer)
  document.body.style.overflow="auto"
}

async function likeGame(){
  currentGame.likes=(currentGame.likes||0)+1
  await supabase.from("games").update({likes:currentGame.likes}).eq("id",currentGame.id)
  updateLikes(); loadTopGames()
}
function updateLikes(){
  document.getElementById("likeCount").innerHTML=`<i class="fas fa-thumbs-up"></i> ${currentGame.likes||0} Likes`
}
async function shareGame(){
  const url=`${location.origin}${location.pathname}?game=${currentGame.id}&title=${encodeURIComponent(currentGame.title)}`
  await navigator.clipboard.writeText(url)
  alert("Game link copied!")
}
function fullscreenGame(){
  const frame=document.getElementById("gameFrame")
  if(!isFullscreen){frame.requestFullscreen();isFullscreen=true}
  else{document.exitFullscreen();isFullscreen=false}
}

loadGames()
</script>
</body>
</html>
