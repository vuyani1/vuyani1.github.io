<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>TY-GAMES</title>
  <link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
  <link href="style.css" rel="stylesheet">
</head>
<body>
<div id="splash">
  <img src="https://www.tyvila.online/cdn/ty's-studio.png" alt="ty-studio" class="studio-logo">
  <h1>Welcome to <img src="https://www.tyvila.online/cdn/ty-gameslogo.webp" alt="ty-games" class="games-logo"></h1>
  <p>Made with ❤️ by Ty’s Studio</p>
</div>

<header>
  <img src="https://www.tyvila.online/cdn/ty-gameslogo.webp" class="nav-logo" alt="logo">
  <div class="profile">
    <img id="profilePic" src="https://www.tyvila.online/cdn/default-avatar.png" alt="profile">
    <div class="dropdown" id="dropdownMenu">
      <button onclick="window.location.href='accounts.html'">Account Info</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</header>

<main>
  <section class="stats">
    <div class="flash" id="usernameFlash"></div>
    <div class="flash" id="pointsFlash"></div>
    <div class="flash" id="rankFlash"></div>
    <div class="flash" id="gameCountFlash"></div>
  </section>
  <section class="gamesGrid" id="gamesGrid"></section>
</main>

<footer>
  <p>© 2025 TY-GAMES — Powered by</p>
  <div class="logos">
    <img src="https://www.tyvila.online/cdn/ty's-studio.png" alt="Ty’s Studio">
    <img src="https://supabase.com/dashboard/img/supabase-dark.svg" alt="Supabase">
    <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" alt="GitHub">
    <img src="https://www.onlinegames.io/media/website/online-games-io.png" alt="OnlineGames.io">
  </div>
</footer>

<div class="toast" id="toast"></div>
<script type="module" src="app.js"></script>
</body>
</html>
