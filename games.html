<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Games — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<style>
body{margin:0;font-family:sans-serif;background:#0a0a0f;color:#fff;}
header{padding:15px;background:#111;display:flex;justify-content:space-between;align-items:center;}
header h1{margin:0;font-size:22px;}
button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:#06b6d4;color:#fff;}
.container{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px;}
.card{background:#1a1a2e;padding:15px;border-radius:10px;text-align:center;cursor:pointer;transition:.2s;}
.card:hover{transform:scale(1.05);}
.card img{width:100%;border-radius:8px;}
#gameModal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:none;justify-content:center;align-items:center;}
#gameFrame{width:80%;height:80%;border:none;border-radius:10px;}
</style>
</head>
<body>
<header>
  <h1>🎮 TyVila Games</h1>
  <div id="userInfo"></div>
  <button onclick="window.location.href='account.html'">Account</button>
</header>

<div class="container" id="gamesList"></div>

<div id="gameModal">
  <iframe id="gameFrame"></iframe>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase=createClient("https://wwcedhbbdoyrmquokyjj.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4")

let currentUser, timer

async function checkAuth(){
  const {data:{user}}=await supabase.auth.getUser()
  if(!user){window.location.href="login.html";return}
  currentUser=user
  const {data:profile}=await supabase.from("profiles").select("username,points").eq("id",user.id).single()
  document.getElementById("userInfo").innerText=`${profile.username||user.email} | Points: ${profile.points}`
}
checkAuth()

async function loadGames(){
  const {data}=await supabase.from("games").select("*")
  const container=document.getElementById("gamesList")
  container.innerHTML=""
  data.forEach(g=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerHTML=`<img src="${g.image}"><h3>${g.title}</h3>`
    div.onclick=()=>playGame(g.embed)
    container.appendChild(div)
  })
}
loadGames()

function playGame(url){
  const modal=document.getElementById("gameModal")
  const frame=document.getElementById("gameFrame")
  frame.src=url
  modal.style.display="flex"
  let seconds=0
  timer=setInterval(async()=>{
    seconds++
    if(seconds%60===0){ 
      await supabase.rpc("increment_points",{uid:currentUser.id,amount:1})
    }
  },1000)
  modal.onclick=()=>{modal.style.display="none";frame.src="";clearInterval(timer)}
}
</script>
</body>
</html>
