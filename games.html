<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Games — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Inter,sans-serif;background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;min-height:100vh;display:flex;flex-direction:column}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px)}
header img{height:40px}
header .user{display:flex;align-items:center;gap:10px}
header .user img{width:35px;height:35px;border-radius:50%;border:2px solid #ffeb3b}
main{flex:1;padding:20px;display:flex;flex-direction:column;align-items:center}
#gameContainer{display:flex;flex-wrap:wrap;gap:15px;width:100%;justify-content:center}
.gameCard{background:rgba(255,255,255,0.1);border-radius:16px;overflow:hidden;cursor:pointer;transition:0.3s;flex:1 1 220px;max-width:250px}
.gameCard img{width:100%;height:140px;object-fit:cover}
.gameCard .info{padding:10px;text-align:center}
.gameCard .info h3{margin:5px 0;font-size:16px}
.gameCard .info p{font-size:12px;color:#ddd;margin:0}
#playModal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;z-index:999}
#playModal iframe{width:90%;height:70%;border:none;border-radius:12px}
#playModal .modalHeader{width:90%;display:flex;justify-content:space-between;align-items:center;color:#fff;margin-bottom:10px}
#playModal button{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;font-weight:600}
#playModal .likeBtn{background:#ff5722;color:#fff}
#playModal .fullscreenBtn{background:#06b6d4;color:#fff}
#moreGames{display:flex;flex-wrap:wrap;gap:10px;margin-top:20px;justify-content:center;width:100%}
.moreCard{background:rgba(255,255,255,0.1);border-radius:12px;width:100px;cursor:pointer;transition:0.3s}
.moreCard img{width:100%;height:60px;object-fit:cover;border-radius:12px}
.moreCard p{text-align:center;font-size:12px;margin:5px;color:#fff}
</style>
</head>
<body oncontextmenu="return false">
<header>
  <img src="https://www.tyvila.online/cdn/ty.webp" alt="TyVila Logo">
  <div class="user">
    <span id="username">Loading...</span>
    <img id="avatar" src="https://www.tyvila.online/cdn/default-avatar.png">
    <span id="points">0 pts</span>
  </div>
</header>
<main>
  <div id="gameContainer"></div>

  <div id="playModal">
    <div class="modalHeader">
      <h3 id="modalGameName">Game</h3>
      <div>
        <button class="likeBtn" id="likeBtn">Like ❤️</button>
        <button class="fullscreenBtn" id="fullscreenBtn">Fullscreen ⛶</button>
        <button onclick="closeModal()">Close ✖</button>
      </div>
    </div>
    <iframe id="gameFrame"></iframe>
    <div>Plays: <span id="playsCount">0</span></div>
  </div>

  <div id="moreGames"></div>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient(
  "https://wwcedhbbdoyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
)
let currentUser
let pointsInterval

async function loadUser(){
  const {data:{user}}=await supabase.auth.getUser()
  if(!user){alert("Please login to play games");window.location.href="login.html";return}
  currentUser=user
  let {data:profile}=await supabase.from("profiles").select("*").eq("id",user.id).maybeSingle()
  if(profile){
    document.getElementById("username").textContent=profile.username
    document.getElementById("points").textContent=(profile.points||0)+" pts"
    document.getElementById("avatar").src=profile.avatar_url||"https://www.tyvila.online/cdn/default-avatar.png"
  }
}

async function loadGames(){
  const {data,error}=await supabase.from("games").select("*").order("plays",{ascending:false})
  if(error)return console.error(error)
  const container=document.getElementById("gameContainer")
  container.innerHTML=""
  data.forEach(g=>{
    const card=document.createElement("div")
    card.className="gameCard"
    card.innerHTML=`<img src="${g.image_url}" alt="${g.name}"><div class="info"><h3>${g.name}</h3><p>${g.description||""}</p></div>`
    card.onclick=()=>openGame(g)
    container.appendChild(card)
  })
}

async function openGame(game){
  const modal=document.getElementById("playModal")
  modal.style.display="flex"
  document.getElementById("modalGameName").textContent=game.name
  document.getElementById("gameFrame").src=game.embed_url
  document.getElementById("playsCount").textContent=game.plays
  history.pushState(null,"",`?game=${game.name.replace(/\s+/g,"-")}`)
  pointsInterval=setInterval(async()=>{
    await supabase.rpc("increment_points",{userid:currentUser.id})
    let {data}=await supabase.from("profiles").select("points").eq("id",currentUser.id).maybeSingle()
    if(data)document.getElementById("points").textContent=data.points+" pts"
  },1000)
  document.getElementById("likeBtn").onclick=async()=>{
    await supabase.from("games").update({likes:game.likes+1}).eq("id",game.id)
    game.likes++
    alert("Liked!")
  }
  document.getElementById("fullscreenBtn").onclick=()=>{
    const iframe=document.getElementById("gameFrame")
    if(iframe.requestFullscreen)iframe.requestFullscreen()
    else if(iframe.webkitRequestFullscreen)iframe.webkitRequestFullscreen()
  }
}

function closeModal(){
  document.getElementById("playModal").style.display="none"
  document.getElementById("gameFrame").src=""
  clearInterval(pointsInterval)
  history.pushState(null,"","games.html")
}

loadUser()
loadGames()
</script>
</body>
</html>
