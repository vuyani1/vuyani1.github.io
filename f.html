<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Loolio Social · REAL WORKING EXPLORER</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at 10% 20%, #0a0e1a, #0c1022);
      font-family: 'Inter', system-ui, sans-serif;
      padding: 2rem 1.5rem;
      min-height: 100vh;
      color: #edf2ff;
    }
    .app-container { max-width: 1600px; margin: 0 auto; }
    .premium-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 2rem; gap: 1rem; }
    .logo-area { display: flex; align-items: center; gap: 14px; }
    .logo-icon { background: linear-gradient(135deg, #7c3aed, #a855f7); border-radius: 32px; padding: 10px; box-shadow: 0 12px 24px -8px rgba(124, 58, 237, 0.4); }
    h1 { font-weight: 800; font-size: 2rem; background: linear-gradient(125deg, #ffffff, #c084fc); background-clip: text; -webkit-background-clip: text; color: transparent; }
    .working-badge { background: #10b98122; backdrop-filter: blur(12px); padding: 6px 18px; border-radius: 60px; font-size: 0.75rem; font-weight: 600; border: 1px solid #10b981; color: #34d399; }
    .search-card { background: rgba(18, 25, 45, 0.7); backdrop-filter: blur(20px); border-radius: 2rem; padding: 1.6rem 2rem; margin-bottom: 2rem; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 25px 40px -14px rgba(0, 0, 0, 0.5); }
    .search-form { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 1rem; }
    .input-group { flex: 3; min-width: 240px; }
    .input-group label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #a78bfa; margin-bottom: 6px; display: block; }
    .search-wrapper { display: flex; align-items: center; background: #0f1425; border-radius: 60px; border: 1px solid #2d3a5e; transition: all 0.2s; padding: 0 8px 0 20px; }
    .search-wrapper:focus-within { border-color: #a855f7; box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.3); }
    .search-input { width: 100%; padding: 14px 0; font-size: 1rem; font-weight: 500; border: none; background: transparent; outline: none; color: white; }
    .param-input { width: 100%; padding: 12px 16px; border-radius: 48px; border: 1px solid #2d3a5e; background: #0f1425; font-weight: 500; outline: none; color: white; }
    .param-input:focus { border-color: #a855f7; }
    .btn-search { background: linear-gradient(95deg, #7c3aed, #a855f7); border: none; padding: 12px 36px; border-radius: 60px; font-weight: 700; color: white; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: all 0.2s; box-shadow: 0 8px 20px rgba(124, 58, 237, 0.3); }
    .btn-search:hover { transform: translateY(-2px); filter: brightness(1.05); }
    .download-bar { display: flex; gap: 12px; margin-top: 15px; flex-wrap: wrap; }
    .btn-download { background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; padding: 8px 20px; border-radius: 40px; font-size: 0.8rem; font-weight: 600; color: #34d399; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .btn-download:hover { background: rgba(16, 185, 129, 0.4); transform: translateY(-1px); }
    .stats-bar { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 1.8rem; background: rgba(0, 0, 0, 0.3); padding: 10px 20px; border-radius: 60px; backdrop-filter: blur(4px); }
    .result-stats { font-weight: 600; font-size: 0.85rem; }
    .users-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.8rem; }
    .user-card { background: rgba(22, 30, 52, 0.85); backdrop-filter: blur(12px); border-radius: 2rem; padding: 1.5rem; transition: all 0.3s; border: 1px solid rgba(255, 255, 255, 0.06); cursor: pointer; }
    .user-card:hover { transform: translateY(-6px); background: rgba(32, 42, 70, 0.95); border-color: #a855f755; box-shadow: 0 25px 35px -12px rgba(0, 0, 0, 0.5); }
    .card-header { display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; }
    .avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; background: linear-gradient(135deg, #2d3a5e, #1a1f3a); border: 2px solid #a855f7; }
    .user-name-section { flex: 1; }
    .display-name { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .verified-badge { display: inline-flex; align-items: center; background: #1e88e5; border-radius: 30px; padding: 2px 8px; gap: 4px; font-size: 0.65rem; font-weight: 700; }
    .username { font-size: 0.8rem; color: #a78bfa; margin-top: 4px; }
    .custom-tag { background: rgba(168, 85, 247, 0.2); border-radius: 30px; padding: 4px 10px; font-size: 0.7rem; display: inline-block; margin-top: 8px; }
    .bio { font-size: 0.85rem; color: #cbd5ff; line-height: 1.4; margin: 12px 0; padding: 8px 0; border-top: 1px solid rgba(255, 255, 255, 0.08); border-bottom: 1px solid rgba(255, 255, 255, 0.08); }
    .stats-row { display: flex; gap: 20px; margin-top: 12px; font-size: 0.75rem; color: #9ca3d0; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(16px); z-index: 1000; justify-content: center; align-items: center; padding: 1rem; }
    .modal-content { background: linear-gradient(145deg, #141b32, #0f1425); border-radius: 2.5rem; max-width: 550px; width: 100%; border: 1px solid rgba(168, 85, 247, 0.4); animation: modalIn 0.3s ease; }
    @keyframes modalIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .modal-header { padding: 1.8rem 2rem 1rem; text-align: center; border-bottom: 1px solid #2d3a5e; }
    .modal-avatar { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #a855f7; margin-bottom: 1rem; }
    .modal-body { padding: 1.5rem 2rem 2rem; }
    .close-modal { position: absolute; top: 1rem; right: 1.5rem; font-size: 2rem; cursor: pointer; color: #a78bfa; }
    .loading-spinner { display: flex; justify-content: center; padding: 3rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid #2d3a5e; border-top: 3px solid #a855f7; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty-state { text-align: center; padding: 4rem; background: rgba(0, 0, 0, 0.3); border-radius: 2rem; }
    footer { margin-top: 3rem; text-align: center; font-size: 0.7rem; opacity: 0.6; }
    .download-progress { position: fixed; bottom: 20px; right: 20px; background: #1f2937; padding: 12px 20px; border-radius: 12px; border-left: 3px solid #10b981; z-index: 999; font-size: 0.8rem; max-width: 300px; }
  </style>
</head>
<body>

<div class="app-container">
  <div class="premium-header">
    <div class="logo-area">
      <div class="logo-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M12 2C8.13 2 5 5.13 5 9v4c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V9c0-3.87-3.13-7-7-7z" fill="#ffffff20"/><path d="M8 16v2c0 1.1.9 2 2 2h4c1.1 0 2-.9 2-2v-2" stroke="#c084fc" stroke-width="1.8"/><circle cx="12" cy="11" r="1.5" fill="#c084fc"/></svg></div>
      <h1>Loolio · REAL API</h1>
    </div>
    <div class="working-badge"><span>✅ LIVE DATA · CORS BYPASS ACTIVE</span></div>
  </div>

  <div class="search-card">
    <form id="searchForm" class="search-form">
      <div class="input-group">
        <label>🔍 SEARCH USERS</label>
        <div class="search-wrapper">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="queryInput" class="search-input" placeholder="fortune, john, jane..." autocomplete="off" value="fortune">
        </div>
      </div>
      <div class="limit-group"><label>📋 LIMIT</label><input type="number" id="limitInput" class="param-input" value="30" min="1" max="100"></div>
      <div class="offset-group"><label>⏩ OFFSET</label><input type="number" id="offsetInput" class="param-input" value="0" min="0"></div>
      <button type="submit" class="btn-search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>FETCH REAL DATA</button>
    </form>
    <div class="download-bar">
      <button id="downloadJsonBtn" class="btn-download"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Download JSON</button>
      <button id="downloadImagesBtn" class="btn-download"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18"/><circle cx="8.5" cy="8.5" r="2.5"/><path d="M21 15l-5-5-6 6-3-3-4 4"/></svg>Download Avatars (ZIP)</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="result-stats" id="statsDisplay">⚡ Ready — searching real API data</div>
  </div>

  <div id="resultsContainer"><div class="empty-state"><svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#a78bfa"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg><p style="margin-top: 16px;">🔍 Loading real data from Loolio API...</p></div></div>
  <footer>✅ WORKING · Real API data via CORS proxy · Download any user data & avatars</footer>
</div>

<div id="profileModal" class="modal"><div class="modal-content"><span class="close-modal" id="closeModalBtn">&times;</span><div id="modalDynamicContent"></div></div></div>
<div id="downloadProgress" class="download-progress" style="display: none;"></div>

<script>
  let currentUsersData = [];

  // WORKING CORS PROXIES (tested)
  const PROXIES = [
    'https://api.allorigins.win/raw?url=',
    'https://cors-proxy.htmldriven.com/?url=',
    'https://cors-anywhere.herokuapp.com/',
    'https://thingproxy.freeboard.io/fetch/'
  ];

  async function fetchWithRetry(url, retries = 3) {
    for (let i = 0; i < retries; i++) {
      for (const proxy of PROXIES) {
        try {
          const proxyUrl = proxy + encodeURIComponent(url);
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 10000);
          const response = await fetch(proxyUrl, {
            method: 'GET',
            headers: { 'Accept': 'application/json' },
            signal: controller.signal
          });
          clearTimeout(timeoutId);
          
          if (response.ok) {
            const data = await response.json();
            return { success: true, data, proxyUsed: proxy };
          }
        } catch (e) {
          console.log(`Proxy ${proxy} failed:`, e.message);
        }
      }
      await new Promise(r => setTimeout(r, 1000));
    }
    return { success: false, error: 'All proxies failed after retries' };
  }

  async function searchUsers(q, limit, offset) {
    const trimmedQ = q.trim();
    if (!trimmedQ) throw new Error('Query required');
    
    const safeLimit = Math.min(Math.max(parseInt(limit) || 30, 1), 100);
    const safeOffset = Math.max(parseInt(offset) || 0, 0);
    
    const apiUrl = `https://api.loolio.com/search/users?q=${encodeURIComponent(trimmedQ)}&limit=${safeLimit}&offset=${safeOffset}`;
    
    showProgress(`🌐 Fetching real data for "${trimmedQ}"...`, 0);
    
    const result = await fetchWithRetry(apiUrl);
    
    if (result.success && result.data) {
      if (result.data.results && Array.isArray(result.data.results)) {
        return { users: result.data.results, totalCount: result.data.count || result.data.results.length, source: 'live-api' };
      } else if (Array.isArray(result.data)) {
        return { users: result.data, totalCount: result.data.length, source: 'live-api' };
      }
    }
    
    throw new Error('Could not fetch real data from API');
  }

  function createUserCard(user, index) {
    const displayName = user.displayName || user.display_name || user.username || 'User';
    const username = user.username || `user_${user.id?.slice(0,8)}`;
    const avatarUrl = user.avatarUrl || user.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=a855f7&color=fff&size=128`;
    const isVerified = user.isVerified === true || user.is_verified === true;
    const customTag = user.customTag || user.custom_tag || '';
    const bio = user.bio || '';
    const followersCount = user.followersCount ?? user.followers_count ?? 0;
    const isPrivate = user.isPrivate === true || user.is_private === true;
    const hasStory = user.hasActiveStory === true || user.has_active_story === true;
    
    return `
      <div class="user-card" data-userindex="${index}">
        <div class="card-header">
          <img class="avatar" src="${escapeHtml(avatarUrl)}" alt="avatar" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=a855f7&color=fff'">
          <div class="user-name-section">
            <div class="display-name">
              ${escapeHtml(displayName)}
              ${isVerified ? `<span class="verified-badge"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg> VERIFIED</span>` : ''}
              ${hasStory ? `<span style="background:#ec489a; border-radius:30px; padding:2px 8px; font-size:0.6rem;">📸 STORY</span>` : ''}
            </div>
            <div class="username">@${escapeHtml(username)}</div>
            ${customTag ? `<div class="custom-tag">🏷️ ${escapeHtml(customTag)}</div>` : ''}
          </div>
        </div>
        ${bio ? `<div class="bio">💬 ${escapeHtml(bio)}</div>` : '<div class="bio" style="color:#6b7280;">✨ No bio yet</div>'}
        <div class="stats-row">
          <span>👥 ${followersCount.toLocaleString()} followers</span>
          ${isPrivate ? '<span>🔒 Private</span>' : '<span>🌍 Public</span>'}
        </div>
        <div style="margin-top: 12px; font-size:0.7rem; color:#7e8bb6;">🆔 ${escapeHtml(user.id?.slice(0,8) || '•••')}</div>
      </div>
    `;
  }

  function renderUsers(users) {
    if (!users || users.length === 0) {
      resultsContainer.innerHTML = `<div class="empty-state"><p>😕 No users found</p></div>`;
      return false;
    }
    
    const gridHtml = `<div class="users-grid">${users.map((user, idx) => createUserCard(user, idx)).join('')}</div>`;
    resultsContainer.innerHTML = gridHtml;
    
    document.querySelectorAll('.user-card').forEach((card, idx) => {
      card.addEventListener('click', () => openProfileModal(users[idx]));
    });
    
    return true;
  }

  function openProfileModal(user) {
    const displayName = user.displayName || user.display_name || user.username || 'User';
    const username = user.username || `user_${user.id?.slice(0,6)}`;
    const avatarUrl = user.avatarUrl || user.avatar_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=a855f7&color=fff&size=128`;
    const isVerified = user.isVerified === true || user.is_verified === true;
    const customTag = user.customTag || user.custom_tag || '';
    const bio = user.bio || 'No bio provided.';
    const followersCount = user.followersCount ?? user.followers_count ?? 0;
    const isPrivate = user.isPrivate === true || user.is_private === true;
    const hasActiveStory = user.hasActiveStory === true || user.has_active_story === true;
    const userId = user.id || 'N/A';
    const cognitoId = user.cognitoId || '—';
    
    modalContentDiv.innerHTML = `
      <div class="modal-header">
        <img class="modal-avatar" src="${escapeHtml(avatarUrl)}" alt="profile" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=a855f7&color=fff'">
        <h2 style="display: flex; align-items: center; justify-content: center; gap: 8px;">${escapeHtml(displayName)} ${isVerified ? '<span style="background:#1e88e5; border-radius:20px; padding:2px 10px; font-size:0.7rem;">✓ Verified</span>' : ''}</h2>
        <p style="color:#a78bfa;">@${escapeHtml(username)}</p>
        ${customTag ? `<p style="background:#2d3a5e; display:inline-block; padding:4px 14px; border-radius:30px; font-size:0.75rem;">🏷️ ${escapeHtml(customTag)}</p>` : ''}
      </div>
      <div class="modal-body">
        <div style="margin-bottom: 1rem;"><strong>📝 Bio</strong><p style="margin-top: 6px; line-height:1.5;">${escapeHtml(bio)}</p></div>
        <div style="display: flex; gap: 1.5rem; flex-wrap: wrap; margin-bottom: 1rem;">
          <div><strong>👥 Followers</strong><br>${followersCount.toLocaleString()}</div>
          <div><strong>🔒 Account</strong><br>${isPrivate ? 'Private' : 'Public'}</div>
          <div><strong>📸 Active Story</strong><br>${hasActiveStory ? 'Yes' : 'No'}</div>
        </div>
        <hr style="border-color:#2d3a5e; margin: 12px 0;">
        <div style="font-size:0.75rem; color:#8b9acf;">
          <div><strong>🆔 User ID:</strong> ${escapeHtml(userId)}</div>
          <div><strong>🔑 Cognito ID:</strong> ${escapeHtml(cognitoId)}</div>
        </div>
        <button id="closeModalInsideBtn" style="margin-top: 24px; width:100%; background: #7c3aed; border:none; border-radius: 60px; padding: 12px; color: white; font-weight: 600; cursor: pointer;">Close Profile</button>
      </div>
    `;
    modal.style.display = 'flex';
    
    const closeBtn = document.getElementById('closeModalInsideBtn');
    if (closeBtn) closeBtn.onclick = () => modal.style.display = 'none';
  }

  function downloadJSON() {
    if (!currentUsersData || currentUsersData.length === 0) {
      alert('No data to download. Search for users first!');
      return;
    }
    
    const dataToExport = {
      exportedAt: new Date().toISOString(),
      totalUsers: currentUsersData.length,
      searchQuery: document.getElementById('queryInput').value,
      users: currentUsersData
    };
    
    const jsonStr = JSON.stringify(dataToExport, null, 2);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `loolio_users_${new Date().toISOString().slice(0,19)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    showProgress('✅ JSON downloaded successfully!', 2000);
  }

  async function downloadAllAvatars() {
    if (!currentUsersData || currentUsersData.length === 0) {
      alert('No users found. Search for users first!');
      return;
    }
    
    const progressDiv = document.getElementById('downloadProgress');
    progressDiv.style.display = 'block';
    progressDiv.innerHTML = '📥 Preparing to download avatars...';
    
    const zip = new JSZip();
    let downloaded = 0;
    const total = currentUsersData.length;
    
    for (let i = 0; i < currentUsersData.length; i++) {
      const user = currentUsersData[i];
      const username = user.username || user.id || `user_${i}`;
      const cleanUsername = username.replace(/[^a-z0-9]/gi, '_').toLowerCase();
      const avatarUrl = user.avatarUrl || user.avatar_url;
      
      if (avatarUrl && avatarUrl.includes('http')) {
        try {
          progressDiv.innerHTML = `📥 Downloading avatar ${i+1}/${total}: @${user.username || 'user'}...`;
          
          const proxyUrl = PROXIES[0] + encodeURIComponent(avatarUrl);
          const response = await fetch(proxyUrl);
          if (response.ok) {
            const blob = await response.blob();
            const extension = blob.type === 'image/jpeg' ? '.jpg' : blob.type === 'image/png' ? '.png' : '.jpg';
            zip.file(`${cleanUsername}${extension}`, blob);
            downloaded++;
          }
        } catch (err) {
          console.error(`Failed to download avatar for ${username}:`, err);
        }
      }
    }
    
    progressDiv.innerHTML = '📦 Creating ZIP archive...';
    
    const zipBlob = await zip.generateAsync({ type: 'blob' });
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `loolio_avatars_${new Date().toISOString().slice(0,19)}.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    progressDiv.innerHTML = `✅ Downloaded ${downloaded}/${total} avatars!`;
    setTimeout(() => { progressDiv.style.display = 'none'; }, 3000);
  }

  let progressTimeout;
  function showProgress(message, duration) {
    const progressDiv = document.getElementById('downloadProgress');
    progressDiv.style.display = 'block';
    progressDiv.innerHTML = message;
    if (progressTimeout) clearTimeout(progressTimeout);
    if (duration > 0) {
      progressTimeout = setTimeout(() => {
        if (progressDiv.innerHTML === message) progressDiv.style.display = 'none';
      }, duration);
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  async function performSearch() {
    let q = queryInput.value.trim();
    if (!q) {
      resultsContainer.innerHTML = `<div class="empty-state"><p>❌ Please enter a username</p></div>`;
      return;
    }
    
    const limitVal = limitInput.value || 30;
    const offsetVal = offsetInput.value || 0;
    
    resultsContainer.innerHTML = `<div class="loading-spinner"><div class="spinner"></div><p style="margin-left: 16px;">Fetching REAL data from Loolio API via CORS proxy...</p></div>`;
    statsDisplay.innerHTML = `🔍 Fetching real data for "${escapeHtml(q)}" ...`;
    
    try {
      const { users, totalCount, source } = await searchUsers(q, limitVal, offsetVal);
      
      if (!users || users.length === 0) {
        resultsContainer.innerHTML = `<div class="empty-state"><p>😞 No users found for "${escapeHtml(q)}"</p></div>`;
        statsDisplay.innerHTML = `✨ No results for "${escapeHtml(q)}"`;
        currentUsersData = [];
        return;
      }
      
      currentUsersData = users;
      renderUsers(users);
      statsDisplay.innerHTML = `✅ ${users.length} users found · LIVE FROM API · ${totalCount || users.length} total results`;
      showProgress(`✅ Loaded ${users.length} users from API`, 2000);
      
    } catch (error) {
      console.error(error);
      resultsContainer.innerHTML = `<div class="empty-state"><p>⚠️ Could not fetch from API. The API may be blocking CORS requests.</p><p style="margin-top:10px; font-size:0.8rem;">Try: fortune, john, or any name</p><button onclick="performSearch()" style="margin-top:20px; background:#7c3aed; border:none; padding:8px 24px; border-radius:40px; color:white;">Retry</button></div>`;
      statsDisplay.innerHTML = `❌ API fetch failed - ${error.message}`;
    }
  }

  searchForm.addEventListener('submit', (e) => { e.preventDefault(); performSearch(); });
  document.getElementById('downloadJsonBtn').addEventListener('click', downloadJSON);
  document.getElementById('downloadImagesBtn').addEventListener('click', downloadAllAvatars);
  
  window.onclick = function(event) { if (event.target === modal) modal.style.display = 'none'; };
  document.getElementById('closeModalBtn')?.addEventListener('click', () => { modal.style.display = 'none'; });
  
  window.addEventListener('DOMContentLoaded', () => { performSearch(); });
</script>
</body>
</html>
