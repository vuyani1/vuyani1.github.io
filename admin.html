<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<style>
body{margin:0;font-family:sans-serif;background:#0d0d1a;color:#fff;}
header{padding:15px;background:#111;display:flex;justify-content:space-between;align-items:center;}
header h1{margin:0;font-size:22px;}
button{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:#7c3aed;color:#fff;}
.container{padding:20px;}
.card{background:#1a1a2e;padding:15px;margin:12px 0;border-radius:10px;}
input,textarea{width:100%;padding:10px;margin-top:6px;margin-bottom:12px;border-radius:6px;border:none;}
</style>
</head>
<body>
<header>
  <h1>🎮 Admin Dashboard</h1>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">
  <h2>Add New Game</h2>
  <form id="gameForm">
    <input id="title" placeholder="Game Title" required>
    <input id="embed" placeholder="Embed URL" required>
    <input id="image" placeholder="Image URL" required>
    <input id="tags" placeholder="Tags (comma separated)">
    <textarea id="description" placeholder="Description"></textarea>
    <button type="submit">Add Game</button>
  </form>

  <h2>Games List</h2>
  <div id="gamesList"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase=createClient("https://wwcedhbbdoyrmquokyjj.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4")

async function checkAuth(){
  const {data:{user}}=await supabase.auth.getUser()
  if(!user){window.location.href="login.html";return}
  if(user.email!=="admin@tyvila.online"){window.location.href="games.html";return}
}
checkAuth()

async function loadGames(){
  const {data}=await supabase.from("games").select("*")
  const container=document.getElementById("gamesList")
  container.innerHTML=""
  data.forEach(g=>{
    const div=document.createElement("div")
    div.className="card"
    div.innerHTML=`
      <h3>${g.title}</h3>
      <img src="${g.image}" width="120"><br>
      <small>${g.tags}</small>
      <p>${g.description}</p>
      <button onclick="deleteGame('${g.id}')">Delete</button>
    `
    container.appendChild(div)
  })
}
loadGames()

document.getElementById("gameForm").addEventListener("submit",async e=>{
  e.preventDefault()
  const game={
    title:document.getElementById("title").value,
    embed:document.getElementById("embed").value,
    image:document.getElementById("image").value,
    tags:document.getElementById("tags").value,
    description:document.getElementById("description").value
  }
  await supabase.from("games").insert(game)
  loadGames()
  e.target.reset()
})

window.deleteGame=async(id)=>{
  await supabase.from("games").delete().eq("id",id)
  loadGames()
}

window.logout=async()=>{await supabase.auth.signOut();window.location.href="login.html"}
</script>
</body>
</html>
