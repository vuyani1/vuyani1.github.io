<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#000,#1a1a1a);color:white;display:flex;flex-direction:column;min-height:100vh}
header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#111;border-bottom:2px solid #ff6600;flex-wrap:wrap}
header h1{margin:0;font-size:20px;color:#ff6600}
header button{background:#ff6600;border:none;padding:10px 15px;border-radius:8px;cursor:pointer;color:white;margin:5px;font-size:14px}
header button:hover{background:#e65c00}
.container{flex:1;display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;padding:20px}
.card{background:#1e1e1e;border-radius:12px;padding:15px;box-shadow:0 0 10px rgba(0,0,0,0.6);overflow:auto}
.card h2{margin-top:0;color:#ff6600}
input,textarea,select,button{width:100%;padding:8px;margin:5px 0;border:none;border-radius:6px}
input,textarea,select{background:#2a2a2a;color:white}
button{background:#ff6600;color:white;cursor:pointer}
button:hover{background:#e65c00}
.list{max-height:300px;overflow-y:auto}
.list div{padding:8px;border-bottom:1px solid #333}
.list div b{color:#ff6600}
@media(max-width:700px){header{flex-direction:column;align-items:flex-start}}
</style>
<script>
document.addEventListener("contextmenu",e=>e.preventDefault());
document.onkeydown=function(e){if(e.ctrlKey&&(e.key==="u"||e.key==="s"||e.key==="S"))e.preventDefault();}
</script>
</head>
<body>
<header>
  <h1>Admin Panel</h1>
  <div>
    <button onclick="window.location.href='games.html'">Back to Games</button>
    <button onclick="window.location.href='reset.html'">Reset</button>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">
  <div class="card">
    <h2>Users</h2>
    <div id="users-list" class="list"><p>Loading users...</p></div>
  </div>

  <div class="card">
    <h2>Manage Games</h2>
    <h3>Add Game</h3>
    <input id="game-name" placeholder="Game Name">
    <textarea id="game-desc" placeholder="Game Description"></textarea>
    <input id="game-img" placeholder="Image Link">
    <input id="game-embed" placeholder="Embed Link">
    <button onclick="addGame()">Add Game</button>
    <h3>Remove Game</h3>
    <select id="remove-game-select"><option>Loading...</option></select>
    <button onclick="removeGame()">Remove Selected Game</button>
  </div>

  <div class="card">
    <h2>Comments</h2>
    <div id="comments-list" class="list"><p>Loading comments...</p></div>
  </div>
</div>

<script>
const { createClient } = supabase;
const supabaseClient = createClient(
  "https://wwcedhbbdoyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
);

async function loadUsers(){
  const { data,error } = await supabaseClient.from("profiles").select("username,email");
  const list=document.getElementById("users-list");
  list.innerHTML="";
  if(error||!data){list.innerHTML="<p>Error loading users</p>";return;}
  data.forEach(u=>{
    const div=document.createElement("div");
    div.innerHTML=`<b>${u.username||"Unnamed"}</b> - ${u.email}`;
    list.appendChild(div);
  });
}

async function loadGames(){
  const { data,error } = await supabaseClient.from("games").select("*");
  const select=document.getElementById("remove-game-select");
  select.innerHTML="";
  if(error||!data||data.length===0){select.innerHTML="<option>No games</option>";return;}
  data.forEach(g=>{
    const opt=document.createElement("option");
    opt.value=g.id;
    opt.text=g.name;
    select.appendChild(opt);
  });
}

async function addGame(){
  const name=document.getElementById("game-name").value.trim();
  const desc=document.getElementById("game-desc").value.trim();
  const img=document.getElementById("game-img").value.trim();
  const embed=document.getElementById("game-embed").value.trim();
  if(!name||!embed) return alert("Name and embed link required");
  await supabaseClient.from("games").insert([{name,description:desc,image_link:img,embed_link:embed}]);
  alert("Game added");
  document.getElementById("game-name").value="";
  document.getElementById("game-desc").value="";
  document.getElementById("game-img").value="";
  document.getElementById("game-embed").value="";
  loadGames();
}

async function removeGame(){
  const id=document.getElementById("remove-game-select").value;
  if(!id) return;
  if(!confirm("Are you sure you want to delete this game?")) return;
  await supabaseClient.from("games").delete().eq("id",id);
  alert("Game removed");
  loadGames();
}

async function loadComments(){
  const { data,error } = await supabaseClient.from("comments").select("*").order("created_at",{ascending:false});
  const list=document.getElementById("comments-list");
  list.innerHTML="";
  if(error||!data){list.innerHTML="<p>Error loading comments</p>";return;}
  data.forEach(c=>{
    const div=document.createElement("div");
    div.innerHTML=`<b>${c.username||c.user_email}:</b> ${c.content} <button onclick="deleteComment('${c.id}')">Delete</button>`;
    list.appendChild(div);
  });
}

async function deleteComment(id){
  if(!confirm("Delete this comment?")) return;
  await supabaseClient.from("comments").delete().eq("id",id);
  loadComments();
}

function logout(){ supabaseClient.auth.signOut(); window.location.href='login.html'; }

loadUsers();
loadGames();
loadComments();
</script>
</body>
</html>
