<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin — Comments</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{background:linear-gradient(180deg,#071023,#041028);color:#e6eef8;font-family:Inter, sans-serif;min-height:100vh;padding:22px}
.container{max-width:1000px;margin:0 auto}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.header img{height:44px}
.card{background:rgba(255,255,255,0.03);padding:12px;border-radius:12px;margin-bottom:12px}
.list .row{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:10px;background:rgba(255,255,255,0.02);margin-bottom:8px}
.avatar{width:56px;height:56px;border-radius:50%;object-fit:cover}
.controls{display:flex;gap:8px;margin-left:auto}
.btn{padding:8px 10px;border-radius:8px;border:none;cursor:pointer}
.btn.delete{background:#e53e3e;color:#fff}
.btn.reply{background:linear-gradient(90deg,#7c3aed,#06b6d4);color:#fff}
.small{color:#94a3b8;font-size:13px}
</style>
</head>
<body oncontextmenu="return false">
<div class="container">
  <div class="header">
    <div style="display:flex;gap:12px;align-items:center"><img src="https://www.tyvila.online/cdn/ty.webp"><div style="font-weight:800">Admin — Comments</div></div>
    <div class="small">Moderator</div>
  </div>

  <div id="commentsList" class="card list"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://wwcedhbbdoyrmquokyjj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc1NjAzNjI2NSwiZXhwIjoyMDcxNjEyMjY1fQ.jmI77PRWjaIP3fjnDhgt8KDxO1n7i0jddvmN6EugfLY')

async function load(){
  const { data } = await supabase.from('comments').select('*').order('created_at',{ascending:false})
  const container = document.getElementById('commentsList')
  container.innerHTML = ''
  data.forEach(c=>{
    const row = document.createElement('div')
    row.className = 'row'
    row.innerHTML = `<img class="avatar" src="https://api.dicebear.com/9.x/thumbs/svg?seed=${encodeURIComponent(c.username||'guest')}"><div style="flex:1"><div style="font-weight:800">${c.username||'Guest'}</div><div class="small">${new Date(c.created_at).toLocaleString()}</div><div style="margin-top:8px">${c.text}</div>${c.image_url?'<img src="'+c.image_url+'" style="max-width:100%;border-radius:8px;margin-top:8px">':''}</div><div class="controls"><button class="btn reply" data-id="${c.id}">Reply</button><button class="btn delete" data-id="${c.id}">Delete</button></div>`
    container.appendChild(row)
  })
  container.querySelectorAll('.btn.delete').forEach(b=>b.addEventListener('click',async (e)=>{if(confirm('Delete comment?')){await supabase.from('comments').delete().eq('id',e.currentTarget.dataset.id);load()}}))
  container.querySelectorAll('.btn.reply').forEach(b=>b.addEventListener('click',async (e)=>{const id=e.currentTarget.dataset.id;const reply=prompt('Reply message');if(reply){await supabase.from('comments_replies').insert({comment_id:id,text:reply});alert('Reply added')}}))
}
load()
</script>
</body>
</html>
