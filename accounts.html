<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Account — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Inter,sans-serif;background:linear-gradient(135deg,#7c3aed,#06b6d4);color:#fff;min-height:100vh;display:flex;flex-direction:column}
header{display:flex;justify-content:space-between;align-items:center;padding:15px 25px;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px)}
header img{height:40px}
header .user{display:flex;align-items:center;gap:10px}
header .user img{width:35px;height:35px;border-radius:50%;border:2px solid #ffeb3b}
main{flex:1;display:flex;justify-content:center;align-items:flex-start;padding:40px 20px}
.card{background:rgba(255,255,255,0.1);border-radius:20px;padding:30px;max-width:700px;width:100%;box-shadow:0 8px 25px rgba(0,0,0,.4)}
.profile{display:flex;gap:20px;align-items:center;margin-bottom:30px}
.profile img{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #ffeb3b}
.profile h2{margin:0;font-size:22px}
.profile p{margin:4px 0;color:#ddd}
.stats{margin-top:20px;display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:20px}
.stat{background:rgba(0,0,0,0.2);border-radius:12px;padding:15px;text-align:center}
.stat h3{margin:0;font-size:18px}
.stat p{margin:5px 0 0;font-size:14px;color:#ddd}
.actions{margin-top:30px;display:flex;flex-wrap:wrap;gap:15px}
.actions a,.actions button{flex:1;padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;text-align:center;text-decoration:none}
.actions a{background:linear-gradient(90deg,#7c3aed,#06b6d4);color:white}
.actions button{background:#ef4444;color:white}
footer{text-align:center;padding:15px;font-size:13px;color:#ddd}
footer a{color:#ffeb3b;text-decoration:none;margin:0 5px}
@media(max-width:600px){.profile{flex-direction:column;align-items:center;text-align:center}}
</style>
</head>
<body oncontextmenu="return false">
<header>
  <img src="https://www.tyvila.online/cdn/ty.webp" alt="TyVila Logo">
  <div class="user">
    <span id="username">Loading...</span>
    <img id="avatar" src="https://www.tyvila.online/cdn/default-avatar.png">
    <span id="points">0 pts</span>
  </div>
</header>
<main>
  <div class="card">
    <div class="profile">
      <img id="profileAvatar" src="https://www.tyvila.online/cdn/default-avatar.png">
      <div>
        <h2 id="profileUsername">Loading...</h2>
        <p id="profileEmail"></p>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><h3 id="statPoints">0</h3><p>Points</p></div>
      <div class="stat"><h3>🎮</h3><p>Play Games</p></div>
      <div class="stat"><h3 id="rank">-</h3><p>Rank</p></div>
    </div>
    <div class="actions">
      <a href="games.html">Play Games</a>
      <a href="ranks.html">View Rankings</a>
      <button id="logoutBtn">Logout</button>
    </div>
  </div>
</main>
<footer>
  <p><a href="terms.html">Terms</a> • <a href="privacy.html">Privacy</a> • <a href="cookies.html">Cookies</a></p>
</footer>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient(
  "https://wwcedhbbdoyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
)

let currentUser

async function loadProfile(){
  const {data:{user}} = await supabase.auth.getUser()
  if(!user){window.location.href="login.html"; return}
  currentUser=user
  let {data:profile} = await supabase.from("profiles").select("*").eq("id",user.id).maybeSingle()
  if(!profile){
    await supabase.from("profiles").insert({
      id:user.id,
      email:user.email,
      username:user.user_metadata?.preferred_username||user.email.split("@")[0],
      avatar_url:user.user_metadata?.picture
    })
    profile={username:user.user_metadata?.preferred_username||user.email.split("@")[0],email:user.email,avatar_url:user.user_metadata?.picture,points:0}
  }
  document.getElementById("username").textContent=profile.username
  document.getElementById("points").textContent=(profile.points??0)+" pts"
  document.getElementById("profileUsername").textContent=profile.username
  document.getElementById("profileEmail").textContent=profile.email
  document.getElementById("profileAvatar").src=profile.avatar_url||"https://www.tyvila.online/cdn/default-avatar.png"
  document.getElementById("statPoints").textContent=profile.points??0

  let {data}=await supabase.from("profiles").select("*").order("points",{ascending:false})
  let rank = data.findIndex(p=>p.id===user.id)+1
  document.getElementById("rank").textContent = rank
}

document.getElementById("logoutBtn").addEventListener("click",async()=>{
  await supabase.auth.signOut()
  window.location.href="login.html"
})

loadProfile()
</script>
</body>
</html>
