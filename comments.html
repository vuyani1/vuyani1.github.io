<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Comments — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{background:linear-gradient(180deg,#071023,#041028);color:#e6eef8;font-family:Inter, sans-serif;min-height:100vh;padding:24px}
.container{max-width:800px;margin:20px auto}
.header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.header img{height:44px}
.card{background:rgba(255,255,255,0.03);padding:16px;border-radius:12px;margin-bottom:12px}
.form textarea{width:100%;padding:12px;border-radius:10px;border:none;background:transparent;color:inherit}
.form .row{display:flex;gap:8px;margin-top:10px}
.btn{padding:10px;border-radius:10px;border:none;cursor:pointer}
.btn.primary{background:linear-gradient(90deg,#7c3aed,#06b6d4);color:#fff}
.comment{display:flex;gap:12px;align-items:flex-start;padding:12px;border-radius:10px;background:rgba(255,255,255,0.02);margin-bottom:10px}
.avatar{width:52px;height:52px;border-radius:50%;object-fit:cover}
.comment .meta{flex:1}
.small{color:#94a3b8;font-size:13px}
.reply-img{max-width:100%;border-radius:8px;margin-top:8px}
</style>
</head>
<body oncontextmenu="return false">
<div class="container">
  <div class="header"><img src="https://www.tyvila.online/cdn/ty.webp"><div style="font-weight:800">Community Comments</div></div>

  <div class="card form">
    <textarea id="commentText" rows="3" placeholder="Say something..."></textarea>
    <div class="row"><input id="imageUrl" placeholder="Optional image URL" style="flex:1;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit"><button id="postBtn" class="btn primary">Post</button></div>
  </div>

  <div id="comments" class="card"></div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://wwcedhbbdoyrmquokyjj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4')

async function loadComments(){
  const { data } = await supabase.from('comments').select('*').order('created_at',{ascending:false})
  const container = document.getElementById('comments')
  container.innerHTML = ''
  data.forEach(c=>{
    const el = document.createElement('div')
    el.className = 'comment'
    el.innerHTML = `<img class="avatar" src="https://api.dicebear.com/9.x/thumbs/svg?seed=${encodeURIComponent(c.username||'guest')}" alt="avatar"><div class="meta"><div style="font-weight:700">${c.username||'Guest'}</div><div class="small">${new Date(c.created_at).toLocaleString()}</div><div style="margin-top:8px">${c.text}</div>${c.image_url?'<img class="reply-img" src="'+c.image_url+'">':''}</div>`
    container.appendChild(el)
  })
}

document.getElementById('postBtn').addEventListener('click', async ()=>{
  const text = document.getElementById('commentText').value.trim()
  const image = document.getElementById('imageUrl').value.trim()
  if(!text) return alert('Write a comment first')
  await supabase.from('comments').insert([{text,username:'Guest',image_url:image || null}])
  document.getElementById('commentText').value = ''
  document.getElementById('imageUrl').value = ''
  loadComments()
})

loadComments()
</script>
</body>
</html>
