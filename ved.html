<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Titan Cloud - Secure Player</title>
    <style>
        /* Force the page to have zero margins and no scrollbars */
        html, body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden; /* Prevents double scrolling */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Container scales perfectly to the device screen */
        #video-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
        }

        /* The Iframe is forced to fill the entire wrapper */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="video-wrapper">
        </div>

    <script>
        (function() {
            /** * TITAN CLOUD - SOURCE MASKING & INJECTION
             * This prevents the URL from showing in "View Source" 
             */
            
            // Masked URL components
            const p1 = "6975e02220";
            const p2 = "7ed27b774438c0";
            const host = "https://tcloud.base44.app/embed/";

            window.onload = function() {
                const wrapper = document.getElementById('video-wrapper');
                const frame = document.createElement('iframe');
                
                // Reassemble the masked source
                frame.src = host + p1 + p2;
                
                // Permissions for a high-end experience
                frame.setAttribute('allow', 'autoplay; fullscreen; encrypted-media; picture-in-picture');
                frame.setAttribute('allowfullscreen', 'true');
                frame.setAttribute('frameborder', '0');
                
                // Fix for iOS/Safari scaling
                frame.style.width = "100%";
                frame.style.height = "100%";

                wrapper.appendChild(frame);
            };

            // Anti-Inspect shortcuts
            document.onkeydown = function(e) {
                if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74))) {
                    return false;
                }
            };
        })();
    </script>
</body>
</html>
