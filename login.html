<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1: #050510;
  --bg2: #0c0c1a;
  --neon1: #7c3aed;
  --neon2: #06b6d4;
  --error: #ff4d6d;
  --success: #32ff91;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  color: white;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(180deg, var(--bg1), var(--bg2));
  overflow: hidden;
}
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("https://www.tyvila.online/cdn/LOGIN.webp") center/cover no-repeat;
  opacity: 0.15;
  animation: floatBg 20s infinite alternate ease-in-out;
}
@keyframes floatBg {
  0% { transform: scale(1) translateY(0); }
  100% { transform: scale(1.1) translateY(-20px); }
}
.container {
  position: relative;
  width: 95%;
  max-width: 1000px;
  background: rgba(10,10,25,0.85);
  border: 3px solid transparent;
  border-image: linear-gradient(90deg, var(--neon1), var(--neon2)) 1;
  border-radius: 20px;
  padding: 40px;
  box-shadow: 0 0 30px rgba(124,58,237,0.4), 0 0 50px rgba(6,182,212,0.3);
  animation: glowPulse 3s infinite alternate;
}
@keyframes glowPulse {
  0% { box-shadow: 0 0 20px rgba(124,58,237,0.5); }
  100% { box-shadow: 0 0 40px rgba(6,182,212,0.7); }
}
h1 {
  font-family: 'Press Start 2P', cursive;
  font-size: 28px;
  text-align: center;
  margin: 0 0 20px;
  background: linear-gradient(90deg, var(--neon1), var(--neon2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
form {
  display: flex;
  flex-direction: column;
  gap: 18px;
}
label { font-size: 14px; }
input {
  padding: 14px;
  border-radius: 12px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: white;
  font-size: 16px;
  outline: none;
  transition: all 0.2s;
}
input:focus {
  background: rgba(255,255,255,0.15);
  box-shadow: 0 0 10px var(--neon2);
}
button.primary {
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  font-weight: bold;
  color: white;
  background: linear-gradient(90deg, var(--neon1), var(--neon2));
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
button.primary:hover {
  transform: scale(1.08) rotate(-1deg);
  box-shadow: 0 0 20px var(--neon2);
}
.links {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
}
.links a {
  color: #cfeffd;
  text-decoration: none;
  transition: color 0.2s;
}
.links a:hover { color: var(--neon2); }
.error-msg {
  color: var(--error);
  text-align: center;
  min-height: 20px;
}
.success-msg {
  color: var(--success);
  text-align: center;
  min-height: 20px;
}
</style>
</head>
<body>
<div class="container">
  <h1>🎮 TyVila Login 🎮</h1>
  <form id="loginForm">
    <div class="error-msg" id="loginError"></div>
    <div class="success-msg" id="loginSuccess"></div>

    <label for="identifier">Email or Username</label>
    <input id="identifier" type="text" placeholder="you@example.com or username" required>

    <label for="password">Password</label>
    <input id="password" type="password" placeholder="Enter password" required>

    <button class="primary" type="submit">▶ Enter Game</button>

    <div class="links">
      <a href="signup.html">🆕 Create account</a>
      <a href="#" id="forgotLink">❓ Forgot password?</a>
    </div>
  </form>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient(
  "https://wwcedhbbdoyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
)

function isValidInput(str){return /^[A-Za-z0-9@.]+$/.test(str)}

async function sendResetLink(email){
  await supabase.auth.resetPasswordForEmail(email,{
    redirectTo:"https://www.tyvila.online/reset.html"
  })
}

document.getElementById("loginForm").addEventListener("submit",async e=>{
  e.preventDefault()
  const id=document.getElementById("identifier").value.trim()
  const pw=document.getElementById("password").value
  const err=document.getElementById("loginError")
  const ok=document.getElementById("loginSuccess")
  err.textContent=""; ok.textContent=""

  if(!isValidInput(id)||!pw){err.textContent="Invalid input";return}

  let email=id
  if(!id.includes("@")){
    const {data:userRow}=await supabase.from("profiles").select("email").eq("username",id).maybeSingle()
    if(!userRow){err.textContent="User not found";return}
    email=userRow.email
  }

  const {data,error}=await supabase.auth.signInWithPassword({email,password:pw})
  if(error){err.textContent=error.message;return}
  const user=data.user
  if(!user.confirmed_at){err.textContent="Verify your email first";return}

  if(user.email==="admin@tyvila.online"){
    const choice=confirm("Login as admin?\nOK = Dashboard, Cancel = Website")
    window.location.href= choice? "admin.html":"account.html"
  } else {
    ok.textContent="Login successful! Redirecting…"
    setTimeout(()=>window.location.href="account.html",800)
  }
})

document.getElementById("forgotLink").addEventListener("click",async e=>{
  e.preventDefault()
  const email=prompt("Enter your email to reset password")
  if(email&&!isValidInput(email)){alert("Invalid input");return}
  if(email){await sendResetLink(email);alert("Reset link sent. Check inbox.")}
})
</script>
</body>
</html>
