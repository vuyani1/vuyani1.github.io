<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg1:#7c3aed;--bg2:#06b6d4;--card:#ffffff;--muted:#6b7280}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--bg1),var(--bg2))}
.card{width:96%;max-width:420px;background:var(--card);border-radius:16px;padding:22px;box-shadow:0 20px 60px rgba(2,6,23,0.35);text-align:center}
.logo{width:72px;margin:0 auto 6px}
h1{font-size:20px;margin-bottom:8px;color:#0f1724}
p.small{color:var(--muted);margin-bottom:18px}
input{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #e6eef8}
.btn{width:100%;padding:12px;border-radius:10px;border:none;margin-top:8px;font-weight:800;cursor:pointer}
.btn.primary{background:linear-gradient(90deg,var(--bg1),var(--bg2));color:white}
.btn.google{background:#fff;color:#111;display:flex;align-items:center;justify-content:center;gap:10px;border:1px solid #eee}
.top-player{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;background:linear-gradient(90deg,rgba(124,58,237,0.08),rgba(6,182,212,0.04));margin-bottom:12px}
.top-player img{width:56px;height:56px;border-radius:50%}
.top-player .info{flex:1;text-align:left}
.small-muted{color:#475569;font-size:13px}
</style>
</head>
<body oncontextmenu="return false">
<div class="card">
  <img class="logo" src="https://www.tyvila.online/cdn/ty.webp" alt="logo">
  <h1>Welcome to TyVila</h1>
  <div id="topSpot" class="top-player">
    <img id="topAvatar" src="https://www.tyvila.online/cdn/default-avatar.png" alt="top player">
    <div class="info">
      <div id="topName" style="font-weight:800">Top Player</div>
      <div id="topPoints" class="small-muted">— pts</div>
    </div>
    <div style="font-weight:700;color:#0f1724">That could be you</div>
  </div>

  <form id="emailForm">
    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>
    <button class="btn primary" type="submit">Sign in with Email</button>
  </form>

  <div style="margin:10px 0"><button id="googleBtn" class="btn google"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:20px;height:20px"> Sign in with Google</button></div>

  <div style="margin-top:10px" class="small-muted">By signing in you agree to our <a href="terms.html">Terms</a>.</div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://wwcedhbbdoyrmquokyjj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4')

document.getElementById('emailForm').addEventListener('submit', async (e)=>{
  e.preventDefault()
  const fd = new FormData(e.target)
  const email = fd.get('email')
  const password = fd.get('password')
  const { error } = await supabase.auth.signInWithPassword({ email, password })
  if(error) return alert(error.message)
  window.location.href = 'accounts.html'
})

document.getElementById('googleBtn').addEventListener('click', async ()=>{
  const { error } = await supabase.auth.signInWithOAuth({ provider: 'google' })
  if(error) alert(error.message)
})

async function loadTopPlayer(){
  const { data } = await supabase.from('profiles').select('username,avatar_url,points').order('points',{ascending:false}).limit(1)
  if(data && data[0]){
    const p = data[0]
    document.getElementById('topAvatar').src = p.avatar_url || 'https://www.tyvila.online/cdn/default-avatar.png'
    document.getElementById('topName').textContent = p.username
    document.getElementById('topPoints').textContent = (p.points ?? 0) + ' pts'
  }
}
loadTopPlayer()
</script>
</body>
</html>
