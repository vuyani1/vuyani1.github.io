<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — Ty's Studio</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body {margin:0;font-family:'Inter',sans-serif;background:#0f0f1a;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;}
header img {width:80px;margin-bottom:20px;}
h1 {color:#00ffcc;font-size:2rem;text-align:center;}
form {background:rgba(255,255,255,0.05);padding:30px;border-radius:16px;display:flex;flex-direction:column;gap:15px;width:320px;}
input {padding:12px;border-radius:8px;border:none;background:#1a1a2e;color:#fff;font-size:1rem;}
button {padding:12px;border:none;border-radius:12px;background:linear-gradient(90deg,#00ffcc,#0066ff);color:#fff;font-weight:bold;cursor:pointer;font-size:1rem;}
.google-btn {display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#000;font-weight:bold;}
.google-btn img {width:20px;}
p {text-align:center;color:#ccc;font-size:0.9rem;}
</style>
</head>
<body>
<header>
<img src="https://www.tyvila.online/cdn/ty.webp" alt="Ty's Studio Logo">
<h1>Login to Ty's Studio</h1>
</header>

<form id="loginForm">
<input type="email" id="email" placeholder="Email" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Login</button>
</form>

<button class="google-btn" id="googleLogin">
<img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google"> Login with Google
</button>

<p id="errorMsg"></p>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://wwcedhbbdboyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
)

const loginForm = document.getElementById('loginForm')
loginForm.addEventListener('submit', async (e) => {
  e.preventDefault()
  const email = document.getElementById('email').value
  const password = document.getElementById('password').value
  const { data, error } = await supabase.auth.signInWithPassword({ email, password })
  if(error) { document.getElementById('errorMsg').textContent = error.message; return }
  window.location.href = "myaccount.html"
})

document.getElementById('googleLogin').addEventListener('click', async () => {
  const { error } = await supabase.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + '/myaccount.html' }
  })
  if(error) document.getElementById('errorMsg').textContent = error.message
})
</script>
</body>
</html>
