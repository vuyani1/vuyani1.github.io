<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg1:#050510;--bg2:#0c0c1a;
  --neon1:#7c3aed;--neon2:#06b6d4;
  --error:#ff4d6d;--success:#32ff91;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(180deg,var(--bg1),var(--bg2));
  color:white;display:flex;align-items:center;justify-content:center;
  height:100vh;overflow:hidden;
}
.container{
  width:95%;max-width:400px;
  background:rgba(15,15,35,0.9);
  padding:30px;border-radius:20px;
  border:2px solid transparent;
  border-image:linear-gradient(90deg,var(--neon1),var(--neon2)) 1;
  box-shadow:0 0 25px rgba(124,58,237,.4),0 0 40px rgba(6,182,212,.3);
  animation:glow 4s infinite alternate;
}
@keyframes glow{
  0%{box-shadow:0 0 20px var(--neon1);}
  100%{box-shadow:0 0 35px var(--neon2);}
}
h1{
  font-family:'Press Start 2P',cursive;
  font-size:22px;text-align:center;margin-bottom:20px;
  background:linear-gradient(90deg,var(--neon1),var(--neon2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
form{display:flex;flex-direction:column;gap:15px}
input{
  padding:12px;border-radius:10px;border:none;
  background:rgba(255,255,255,.08);color:white;font-size:15px;
}
input:focus{outline:none;box-shadow:0 0 10px var(--neon2)}
button{
  padding:12px;border:none;border-radius:10px;cursor:pointer;
  font-size:16px;font-weight:600;color:white;
  background:linear-gradient(90deg,var(--neon1),var(--neon2));
  transition:.2s;
}
button:hover{transform:scale(1.05)}
.google-btn{
  background:#fff;color:#333;display:flex;align-items:center;justify-content:center;
  gap:10px;font-weight:600;
}
.links{display:flex;justify-content:space-between;font-size:14px}
.links a{color:#cfeffd;text-decoration:none}
.links a:hover{color:var(--neon2)}
.error-msg{color:var(--error);text-align:center;min-height:20px}
.success-msg{color:var(--success);text-align:center;min-height:20px}
</style>
</head>
<body>
<div class="container">
  <h1>🎮 TyVila Login 🎮</h1>
  <form id="loginForm">
    <div class="error-msg" id="loginError"></div>
    <div class="success-msg" id="loginSuccess"></div>
    <input id="identifier" type="text" placeholder="Email or Username" required>
    <input id="password" type="password" placeholder="Password" required>
    <button type="submit">▶ Enter Game</button>
  </form>
  <br>
  <button class="google-btn" id="googleLogin">🔑 Sign in with Google</button>
  <br>
  <div class="links">
    <a href="signup.html">🆕 Create account</a>
    <a href="#" id="forgotLink">❓ Forgot password?</a>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient(
 "https://wwcedhbbdoyrmquokyjj.supabase.co",
 "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
)

async function handleEmailLogin(e){
 e.preventDefault()
 const id=document.getElementById("identifier").value.trim()
 const pw=document.getElementById("password").value
 const err=document.getElementById("loginError")
 const ok=document.getElementById("loginSuccess")
 err.textContent=""; ok.textContent=""

 let email=id
 if(!id.includes("@")){
   const {data:row}=await supabase.from("profiles").select("email").eq("username",id).maybeSingle()
   if(!row){err.textContent="User not found";return}
   email=row.email
 }
 const {data,error}=await supabase.auth.signInWithPassword({email,password:pw})
 if(error){err.textContent=error.message;return}
 ok.textContent="Login successful!"
 setTimeout(()=>window.location.href="account.html",700)
}
document.getElementById("loginForm").addEventListener("submit",handleEmailLogin)

document.getElementById("googleLogin").addEventListener("click",async()=>{
 const {error}=await supabase.auth.signInWithOAuth({provider:"google",options:{redirectTo:"https://www.tyvila.online/account.html"}})
 if(error) alert(error.message)
})

document.getElementById("forgotLink").addEventListener("click",async e=>{
 e.preventDefault()
 const email=prompt("Enter your email to reset password")
 if(email){await supabase.auth.resetPasswordForEmail(email,{redirectTo:"https://www.tyvila.online/reset.html"})
 alert("Reset link sent!")}
})

document.addEventListener("contextmenu",e=>e.preventDefault())
document.onkeydown=e=>{
 if(e.keyCode==123|| (e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key.toUpperCase()))|| (e.ctrlKey&&e.key.toUpperCase()=='U')) return false
}
</script>
</body>
</html>
