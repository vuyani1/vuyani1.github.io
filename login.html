<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TyVila — Login</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg,#7c3aed,#06b6d4);
    display:flex; justify-content:center; align-items:center;
    min-height:100vh; color:#fff;
  }
  .container {
    width:100%; max-width:450px; padding:20px;
  }
  .card {
    background:#fff; border-radius:20px; padding:30px;
    box-shadow:0 10px 35px rgba(0,0,0,0.15);
    text-align:center; color:#111; margin-bottom:20px;
  }
  .card img.logo { width:70px; margin-bottom:15px; }
  .card h1 { margin-bottom:20px; font-size:22px; }
  input {
    width:100%; padding:12px; margin:8px 0;
    border:1px solid #ccc; border-radius:10px; font-size:14px;
  }
  button {
    width:100%; padding:12px; margin:10px 0;
    border:none; border-radius:10px;
    font-weight:600; cursor:pointer; font-size:15px;
    transition:0.2s ease;
  }
  .loginBtn {
    background:linear-gradient(90deg,#7c3aed,#06b6d4); color:#fff;
  }
  .loginBtn:hover {opacity:0.9}
  .googleBtn {
    background:#fff; color:#444; border:1px solid #ddd;
    display:flex; align-items:center; justify-content:center;
    gap:10px; font-weight:600;
  }
  .googleBtn img { width:20px; height:20px; }
  .switch { margin-top:15px; font-size:14px; }
  .switch a { color:#7c3aed; font-weight:600; cursor:pointer; }
  .hidden { display:none; }
  .topPlayer {
    background:rgba(255,255,255,0.15);
    border-radius:16px; padding:18px;
    text-align:center; color:#fff;
  }
  .topPlayer img {
    width:65px; height:65px; border-radius:50%;
    border:2px solid #ffeb3b; margin-bottom:8px;
  }
  #customAlert {
    position:fixed; top:20px; left:50%;
    transform:translateX(-50%);
    background:#ff4444; color:#fff;
    padding:15px 25px; border-radius:12px;
    display:none; z-index:1000; font-weight:600;
    box-shadow:0 4px 20px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<div class="container">
  <!-- Login Card -->
  <div class="card" id="loginCard">
    <img src="https://www.tyvila.online/cdn/ty.webp" class="logo" alt="TyVila Logo">
    <h1>Login to TyVila</h1>
    <form id="emailForm">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" class="loginBtn">Login with Email</button>
    </form>
    <button id="googleBtn" class="googleBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
      Sign in with Google
    </button>
    <div class="switch">Don’t have an account? <a id="showSignup">Create Account</a></div>
  </div>

  <!-- Signup Card -->
  <div class="card hidden" id="signupCard">
    <img src="https://www.tyvila.online/cdn/ty.webp" class="logo" alt="TyVila Logo">
    <h1>Create Your TyVila Account</h1>
    <form id="signupForm">
      <input type="text" name="username" placeholder="Username" required>
      <input type="text" name="full_name" placeholder="Full Name" required>
      <input type="url" name="avatar_url" placeholder="Profile Picture Link">
      <input type="email" name="email" placeholder="Email" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit" class="loginBtn">Sign Up</button>
    </form>
    <button id="googleSignupBtn" class="googleBtn">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg">
      Sign up with Google
    </button>
    <div class="switch">Already have an account? <a id="showLogin">Back to Login</a></div>
  </div>

  <!-- Top Player -->
  <div class="topPlayer" id="topPlayer">
    <strong>🏆 Top Player:</strong><br>
    <img src="https://www.tyvila.online/cdn/default-avatar.png" alt="Top Player Avatar">
    <div id="topUsername">Loading...</div>
    <div id="topPoints">0 pts</div>
    <em>Could be you!</em>
  </div>
</div>

<div id="customAlert"></div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient(
  "https://wwcedhbbdoyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
)

function showAlert(msg){
  const alertDiv=document.getElementById("customAlert")
  alertDiv.textContent=msg
  alertDiv.style.display="block"
  setTimeout(()=>alertDiv.style.display="none",3000)
}

document.getElementById("showSignup").onclick=()=>{
  document.getElementById("loginCard").classList.add("hidden")
  document.getElementById("signupCard").classList.remove("hidden")
}
document.getElementById("showLogin").onclick=()=>{
  document.getElementById("signupCard").classList.add("hidden")
  document.getElementById("loginCard").classList.remove("hidden")
}

document.getElementById("emailForm").onsubmit=async e=>{
  e.preventDefault()
  const form=new FormData(e.target)
  const { error }=await supabase.auth.signInWithPassword({
    email:form.get("email"),
    password:form.get("password")
  })
  if(error){ showAlert(error.message) }
  else{ window.location.href="accounts.html" }
}

document.getElementById("googleBtn").onclick=async()=>{
  const { error }=await supabase.auth.signInWithOAuth({
    provider:"google",
    options:{ redirectTo:"https://www.tyvila.online/accounts.html" }
  })
  if(error) showAlert(error.message)
}

document.getElementById("signupForm").onsubmit=async e=>{
  e.preventDefault()
  const form=new FormData(e.target)
  const { data, error }=await supabase.auth.signUp({
    email:form.get("email"),
    password:form.get("password"),
    options:{
      data:{
        username:form.get("username"),
        full_name:form.get("full_name"),
        avatar_url:form.get("avatar_url")||"https://www.tyvila.online/cdn/default-avatar.png",
        points:0
      }
    }
  })
  if(error){ showAlert(error.message) }
  else{ window.location.href="accounts.html" }
}

document.getElementById("googleSignupBtn").onclick=async()=>{
  const { error }=await supabase.auth.signInWithOAuth({
    provider:"google",
    options:{ redirectTo:"https://www.tyvila.online/accounts.html" }
  })
  if(error) showAlert(error.message)
}

async function loadTopPlayer(){
  const { data }=await supabase.from("profiles").select("*").order("points",{ascending:false}).limit(1)
  if(data && data[0]){
    const p=data[0]
    document.getElementById("topUsername").textContent=p.username
    document.getElementById("topPoints").textContent=p.points+" pts"
    document.querySelector(".topPlayer img").src=p.avatar_url||"https://www.tyvila.online/cdn/default-avatar.png"
  }
}
loadTopPlayer()
</script>
</body>
</html>
