<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Player Rankings — TyVila</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#071023;--card:#07172a;--gold:#f5c24f;--silver:#cfcfcf;--bronze:#b87447;--accent:#7c3aed;--white:#e6eef8}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:linear-gradient(180deg,#041028 0%,var(--bg)100%);color:var(--white);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:22px}
.container{max-width:900px;width:100%}
.header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.header img{height:44px}
.title{font-size:22px;color:var(--accent);font-weight:800}
.board{display:grid;grid-template-columns:1fr;gap:12px}
.top-three{display:flex;gap:12px;align-items:flex-end;justify-content:center;margin-bottom:12px}
.pod{background:var(--card);padding:12px;border-radius:12px;text-align:center;flex:1;box-shadow:0 10px 30px rgba(2,6,23,0.6)}
.pod img{width:86px;height:86px;border-radius:50%;object-fit:cover;margin-bottom:8px}
.list .row{display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;background:linear-gradient(180deg,rgba(255,255,255,0.01),transparent)}
.list img{width:56px;height:56px;border-radius:50%}
.rank-num{font-weight:800;width:44px;text-align:center}
.small{color:#94a3b8;font-size:13px}
</style>
</head>
<body oncontextmenu="return false">
<div class="container">
  <div class="header">
    <img src="https://www.tyvila.online/cdn/ty.webp">
    <div class="title">🏆 Player Rankings</div>
  </div>

  <div id="topArea">
    <div class="top-three" id="topThree"></div>
  </div>

  <div class="card" style="padding:12px;margin-bottom:12px">
    <h3 style="margin-bottom:10px">All Players</h3>
    <div id="list" class="list"></div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient('https://wwcedhbbdoyrmquokyjj.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4')
async function load(){
  const { data } = await supabase.from('profiles').select('id,username,avatar_url,points').order('points',{ascending:false})
  if(!data) return
  const topThree = document.getElementById('topThree')
  topThree.innerHTML = ''
  for(let i=0;i<3;i++){
    const p = data[i] || {username:'—',avatar_url:'https://www.tyvila.online/cdn/default-avatar.png',points:0}
    const pod = document.createElement('div')
    pod.className = 'pod'
    const style = i===0 ? 'border:3px solid var(--gold);transform:scale(1.05)' : i===1 ? 'border:3px solid var(--silver)' : 'border:3px solid var(--bronze)'
    pod.innerHTML = `<div style="${style}"><img src="${p.avatar_url}"><div style="font-weight:800;margin-bottom:6px">${p.username}</div><div class="small">${p.points ?? 0} pts</div></div>`
    topThree.appendChild(pod)
  }

  const list = document.getElementById('list')
  list.innerHTML = ''
  data.forEach((p,i)=>{
    const row = document.createElement('div')
    row.className = 'row'
    row.innerHTML = `<div class="rank-num">#${i+1}</div><img src="${p.avatar_url || 'https://www.tyvila.online/cdn/default-avatar.png'}"><div style="flex:1"><div style="font-weight:700">${p.username}</div><div class="small">${p.points ?? 0} pts</div></div>`
    list.appendChild(row)
  })
}
load()
</script>
</body>
</html>
