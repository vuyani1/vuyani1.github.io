<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TyVila Rankings</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Inter,sans-serif;background:linear-gradient(135deg,#06b6d4,#7c3aed);color:#fff;min-height:100vh;display:flex;flex-direction:column}
header{padding:15px;text-align:center;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px)}
h2{margin:10px 0}
table{width:90%;margin:20px auto;border-collapse:collapse;background:rgba(255,255,255,0.1);border-radius:12px;overflow:hidden}
th,td{padding:12px;text-align:center}
tr:nth-child(odd){background:rgba(255,255,255,0.05)}
.rankBadge{font-weight:700}
</style>
</head>
<body>
<header>
  <h2>🏆 TyVila Player Rankings</h2>
</header>
<main>
  <table>
    <thead><tr><th>Rank</th><th>Player</th><th>Points</th><th>Badge</th></tr></thead>
    <tbody id="rankBody"></tbody>
  </table>
</main>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase=createClient(
 "https://wwcedhbbdoyrmquokyjj.supabase.co",
 "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
)
function getRank(points){
  if(points>=1000) return "Crown 👑"
  if(points>=500) return "Diamond 💎"
  if(points>=250) return "Gold 🥇"
  if(points>=100) return "Silver 🥈"
  return "Bronze 🥉"
}
async function loadRanks(){
  let {data}=await supabase.from("profiles").select("username,points,avatar_url").order("points",{ascending:false}).limit(50)
  const body=document.getElementById("rankBody");body.innerHTML=""
  data.forEach((u,i)=>{
    const tr=document.createElement("tr")
    tr.innerHTML=`<td>#${i+1}</td><td>${u.username}</td><td>${u.points}</td><td class="rankBadge">${getRank(u.points)}</td>`
    body.appendChild(tr)
  })
}
loadRanks()
</script>
</body>
</html>
