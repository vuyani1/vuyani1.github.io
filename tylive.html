<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>TyVila Live</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<style>
body { margin:0; background:#0d0d12; color:#fff; font-family:sans-serif; }
header { padding:15px; background:#111; display:flex; justify-content:space-between; align-items:center; }
#videoContainer { display:flex; justify-content:center; margin:20px; }
video, img { max-width:90%; border-radius:12px; box-shadow:0 0 20px rgba(0,0,0,0.6); }
#comments { max-width:600px; margin:20px auto; background:#1a1a2e; padding:15px; border-radius:12px; }
.comment { padding:8px; border-bottom:1px solid #333; }
#viewerCount { margin:10px; text-align:center; font-size:14px; color:#0af; }
</style>
</head>
<body>
<header>
  <h1>📺 TyVila Live</h1>
  <div id="viewerCount">Viewers: 0</div>
</header>

<div id="videoContainer">
  <img id="standby" src="https://www.tyvila.online/cdn/tylivestandby.webp">
  <video id="liveVideo" controls autoplay muted style="display:none"></video>
</div>

<div id="comments">
  <h3>💬 Live Chat</h3>
  <div id="commentList"></div>
  <textarea id="commentInput" placeholder="Type a message..."></textarea>
  <button id="sendBtn">Send</button>
</div>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://wwcedhbbdoyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
);

let currentStream;

supabase.channel('tylive-streams')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'tylive_streams' }, payload => {
    loadStream();
  })
  .subscribe();

async function loadStream() {
  const { data } = await supabase.from("tylive_streams")
    .select("*")
    .order("started_at", { ascending: false })
    .limit(1)
    .single();
  currentStream = data;
  if(!data || data.status === "standby" || data.status === "ended") {
    document.getElementById("standby").style.display="block";
    document.getElementById("liveVideo").style.display="none";
  } else {
    const video = document.getElementById("liveVideo");
    video.src = data.source_url;
    video.style.display="block";
    document.getElementById("standby").style.display="none";
  }
}
loadStream();

supabase.channel('tylive-comments')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tylive_comments' }, payload => {
    renderComment(payload.new);
  })
  .subscribe();

async function loadComments() {
  const { data } = await supabase.from("tylive_comments").select("*").order("created_at");
  data.forEach(renderComment);
}
loadComments();

function renderComment(c) {
  const div=document.createElement("div");
  div.className="comment";
  div.innerText=c.comment;
  document.getElementById("commentList").appendChild(div);
}

document.getElementById("sendBtn").onclick=async()=>{
  const text=document.getElementById("commentInput").value.trim();
  if(!text || !currentStream) return;
  await supabase.from("tylive_comments").insert({stream_id: currentStream.id, comment: text});
  document.getElementById("commentInput").value="";
}
</script>
</body>
</html>
