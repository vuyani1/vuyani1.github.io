<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Usernames — TyVila Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#0a0a0f;color:#fff;padding:20px}
h1{text-align:center;color:#06b6d4}
table{width:100%;border-collapse:collapse;margin-top:20px}
th,td{border:1px solid #222;padding:10px;text-align:center}
th{background:#111}
tr:nth-child(even){background:#1a1a2e}
</style>
</head>
<body>
<h1>All Users — TyVila Admin</h1>
<table>
  <thead>
    <tr><th>#</th><th>Username</th><th>Email</th><th>Points</th><th>Rank</th></tr>
  </thead>
  <tbody id="userTable"></tbody>
</table>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
const supabase = createClient(
  "https://wwcedhbbdoyrmquokyjj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4"
)

async function loadUsers(){
  const {data:{user}} = await supabase.auth.getUser()
  if(!user || user.email!=="admin@tyvila.online") return window.location.href='login.html'
  const {data:users} = await supabase.from("profiles").select("*").order("points",{ascending:false})
  const tbody = document.getElementById("userTable")
  tbody.innerHTML=""
  users.forEach((u,i)=>{
    const tr=document.createElement("tr")
    tr.innerHTML=`<td>${i+1}</td><td>${u.username}</td><td>${u.email}</td><td>${u.points||0}</td><td>${u.rank||"-"}</td>`
    tbody.appendChild(tr)
  })
}

loadUsers()
</script>
</body>
</html>
