<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TyVila Game</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<header><h1 id="game-name"></h1><button onclick="goDashboard()">Back</button></header>
<div class="game-container">
<iframe id="game-frame" width="800" height="600"></iframe>
<div class="comments">
<h3>Comments</h3>
<div id="comments-list"></div>
<input type="text" id="comment-text" placeholder="Write a comment">
<button onclick="addComment()">Post Comment</button>
</div>
</div>
<script src="assets/js/main.js"></script>
<script>
const supabaseUrl = "https://wwcedhbbdoyrmquokyjj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);
const urlParams = new URLSearchParams(window.location.search);
const gameId = urlParams.get("game");

async function loadGame() {
    const { data } = await supabase.from("games").select("*").eq("id", gameId).single();
    document.getElementById("game-name").innerText = data.name;
    document.getElementById("game-frame").src = data.embed_link;
    loadComments();
}

async function loadComments() {
    const { data } = await supabase.from("game_comments").select("*, users(username)").eq("game_id", gameId).order("created_at", { ascending: true });
    const container = document.getElementById("comments-list");
    container.innerHTML = "";
    data.forEach(c => {
        const div = document.createElement("div");
        div.className = "comment";
        div.innerHTML = `<b>${c.users.username}</b>: ${c.comment}` + (c.highlighted ? "<span class='highlighted'>★</span>" : "");
        container.appendChild(div);
    });
}

async function addComment() {
    const text = document.getElementById("comment-text").value;
    const user = supabase.auth.getUser();
    const { data: u } = await user;
    await supabase.from("game_comments").insert([{ game_id: gameId, user_id: u.user.id, comment: text }]);
    document.getElementById("comment-text").value = "";
    loadComments();
}

function goDashboard() { window.location.href = "dashboard.html"; }

loadGame();
</script>
</body>
</html>
