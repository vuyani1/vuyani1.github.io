<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TyVila Dashboard</title>
<link rel="icon" href="https://www.tyvila.online/cdn/favicon.ico">
<link rel="stylesheet" href="assets/css/style.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
<header>
<h1>TyVila Games</h1>
<button onclick="logout()">Logout</button>
</header>
<div class="container">
<div class="games-list" id="games-list"></div>
<div class="leaderboard" id="leaderboard">
<h2>Leaderboard</h2>
<ul id="rank-list"></ul>
</div>
</div>
<script src="assets/js/main.js"></script>
<script>
const supabaseUrl = "https://wwcedhbbdoyrmquokyjj.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind3Y2VkaGJiZG95cm1xdW9reWpqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTYwMzYyNjUsImV4cCI6MjA3MTYxMjI2NX0.s29eO4ZQ74R6Jktn5zKZ-AiH6_QYC-_9WFqAS_m1kj4";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function logout() { await supabase.auth.signOut(); window.location.href = "index.html"; }

async function loadGames() {
    const { data, error } = await supabase.from("games").select("*").order("plays", { ascending: false });
    const container = document.getElementById("games-list");
    container.innerHTML = "";
    data.forEach(g => {
        const div = document.createElement("div");
        div.className = "game-card";
        div.innerHTML = `<img src="${g.image_link}" alt="${g.name}"><h3>${g.name}</h3><p>${g.description}</p><button onclick="playGame('${g.id}')">Play</button>`;
        container.appendChild(div);
    });
}

async function loadLeaderboard() {
    const { data } = await supabase.from("users").select("username, points").order("points", { ascending: false }).limit(10);
    const list = document.getElementById("rank-list");
    list.innerHTML = "";
    data.forEach((u, idx) => list.innerHTML += `<li>${idx+1}. ${u.username} - ${u.points} pts</li>`);
}

function playGame(gameId) { window.location.href = `game.html?game=${gameId}`; }

loadGames();
loadLeaderboard();
</script>
</body>
</html>
